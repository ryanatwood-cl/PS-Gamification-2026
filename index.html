        )}

        {/* ---------- Footer ---------- */}
        <footer className="flex items-center justify-between py-6 text-[11px]" style={{ color: '#52525B' }}>
          <div className="flex items-center gap-2">
            <span className="w-1.5 h-1.5 rounded-full" style={{ background: '#60A5FA' }} />
            <span>All data stays in your browser. Nothing uploaded.</span>
          </div>
          <div>Tally · Scoreboard</div>
        </footer>
        </div>
      </div>

      {/* ---------- Click-activated person breakdown card ---------- */}
      {selectedPerson && (() => {
        const person = people.find(p => p.key === selectedPerson.personKey);
        return person ? (
          <PersonBreakdownCard
            key={selectedPerson.personKey}
            person={person}
            rect={selectedPerson.rect}
            points={points}
            sources={sources}
            sourceConfig={SOURCE_CONFIG}
            zoomDuplicateIndices={zoomSkipIndices}
            salesforceDuplicateIndices={salesforceDuplicateIndices}
            selectedSliceKey={selectedPerson.sliceKey}
            onSelectSlice={onSliceSelect}
            onActionSelect={onActionSelect}
            onActionBack={onActionBack}
            selectedActionIndex={selectedPerson.actionIndex}
            onClose={onClosePersonCard}
          />
        ) : null;
      })()}
    </div>
  );
}

/* ---------- Sub-component: Stat card ---------- */

function StatCard({ label, value, accent, icon: Icon }) {
  return (
    <div className="panel p-5 relative overflow-hidden">
      <div className="flex items-center justify-between mb-4">
        <span className="text-[10.5px] uppercase tracking-[0.2em]" style={{ color: '#71717A' }}>
          {label}
        </span>
        <Icon size={14} style={{ color: accent }} />
      </div>
      <div className="mono tabular text-[34px] font-semibold leading-none" style={{ color: accent }}>
        {value.toLocaleString()}
      </div>
    </div>
  );
}

/* ---------- Sub-component: Click-activated breakdown card ---------- */

function PersonBreakdownCard({
  person, rect, points, sources, sourceConfig,
  zoomDuplicateIndices,
  salesforceDuplicateIndices,
  selectedSliceKey, onSelectSlice,
  selectedActionIndex, onActionSelect, onActionBack,
  onClose
}) {
  // Segments in display order — matches SOURCE_CONFIG keys
  const segments = [
    {
      name: 'Salesforce',
      pointsKey: 'salesforceTicket',
      sourceKey: 'salesforce',
      count: person.salesforce,
      perAction: points.salesforceTicket,
      value: person.salesforcePoints != null ? person.salesforcePoints : person.salesforce * points.salesforceTicket,
      color: POINT_ACCENTS.salesforceTicket
    },
    {
      name: 'Zoom',
      pointsKey: 'zoomMeeting',
      sourceKey: 'zoom',
      count: person.zoom,
      perAction: points.zoomMeeting,
      value: person.zoom * points.zoomMeeting,
      color: POINT_ACCENTS.zoomMeeting
    },
    {
      name: 'Zoom Phone',
      pointsKey: 'zoomPhoneCall',
      sourceKey: 'zoomPhone',
      count: person.zoomPhone,
      perAction: points.zoomPhoneCall,
      value: person.zoomPhone * points.zoomPhoneCall,
      color: POINT_ACCENTS.zoomPhoneCall
    },
    {
      name: 'Calendly',
      pointsKey: 'calendlyMeeting',
      sourceKey: 'calendly',
      count: person.calendly,
      perAction: points.calendlyMeeting,
      value: person.calendly * points.calendlyMeeting,
      color: POINT_ACCENTS.calendlyMeeting
    }
  ];
  const activeSegments = segments.filter(s => s.value > 0);
  const hue = nameToHue(person.name);
  const detail = selectedSliceKey
    ? segments.find(s => s.pointsKey === selectedSliceKey)
    : null;

  const CARD_WIDTH = 320;
  const MAX_CARD_HEIGHT = 560;
  const PAD = 16;

  // Compute the actual max height the card can use given the viewport
  const maxCardHeight = useMemo(() => {
    if (typeof window === 'undefined') return MAX_CARD_HEIGHT;
    return Math.min(MAX_CARD_HEIGHT, window.innerHeight - PAD * 2);
  }, []);

  // Initial position: to the right of the name anchor, ensuring the full card fits
  const initialPos = useMemo(() => {
    let left = rect.right + 12;
    let top = rect.top - 8;
    if (typeof window !== 'undefined') {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      // Horizontal: flip to left side if needed, then clamp
      if (left + CARD_WIDTH > vw - PAD) {
        left = rect.left - CARD_WIDTH - 12;
      }
      if (left < PAD) left = PAD;
      // Vertical: shift up if the full card would extend below the viewport
      if (top + maxCardHeight > vh - PAD) {
        top = vh - maxCardHeight - PAD;
      }
      if (top < PAD) top = PAD;
    }
    return { left, top };
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []); // mount-only — key prop on parent handles re-initialization

  const [position, setPosition] = useState(initialPos);
  const [isDragging, setIsDragging] = useState(false);
  const dragOffsetRef = useRef({ x: 0, y: 0 });
  const cardRef = useRef(null);

  const onDragHandleMouseDown = (e) => {
    // Don't initiate drag if the user clicked the close button (or any button)
    if (e.target.closest('button')) return;
    // Only respond to primary button
    if (e.button !== 0) return;
    const cardRect = cardRef.current?.getBoundingClientRect();
    if (!cardRect) return;
    dragOffsetRef.current = {
      x: e.clientX - cardRect.left,
      y: e.clientY - cardRect.top
    };
    setIsDragging(true);
    e.preventDefault();
  };

  useEffect(() => {
    if (!isDragging) return;
    const onMove = (e) => {
      const card = cardRef.current;
      const cw = card?.offsetWidth || CARD_WIDTH;
      const ch = card?.offsetHeight || maxCardHeight;
      let newLeft = e.clientX - dragOffsetRef.current.x;
      let newTop = e.clientY - dragOffsetRef.current.y;
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      // Clamp so the ENTIRE card stays within the viewport (including bottom)
      newLeft = Math.max(4, Math.min(vw - cw - 4, newLeft));
      const topMax = Math.max(4, vh - ch - 4);
      newTop = Math.max(4, Math.min(topMax, newTop));
      setPosition({ left: newLeft, top: newTop });
    };
    const onUp = () => setIsDragging(false);
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    // Disable text selection while dragging
    const prevUserSelect = document.body.style.userSelect;
    document.body.style.userSelect = 'none';
    return () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      document.body.style.userSelect = prevUserSelect;
    };
  }, [isDragging, maxCardHeight]);

  // Gather actions for the drill-down detail
  const detailActions = (() => {
    if (!detail) return [];
    const src = sources[detail.sourceKey];
    if (!src || !src.selectedColumn) return [];
    const isZoom = detail.sourceKey === 'zoom';
    const isSalesforce = detail.sourceKey === 'salesforce';
    return src.rows
      .map((row, idx) => ({ row, idx }))
      .filter(({ row, idx }) => {
        // Skip Zoom rows that duplicate a Calendly booking (or too short)
        if (isZoom && zoomDuplicateIndices && zoomDuplicateIndices.has(idx)) return false;
        // Skip Salesforce rows whose case number is represented by a meeting
        if (isSalesforce && salesforceDuplicateIndices && salesforceDuplicateIndices.has(idx)) return false;
        const name = String(row[src.selectedColumn] || '').trim();
        if (!name) return false;
        const rawKey = nameKey(name);
        const canonKey = CANONICAL_KEY[rawKey] || rawKey;
        return canonKey === person.key;
      })
      .map(({ row }) => row);
  })();

  // For summary/aggregated sources, each row represents `countColumn` actions
  // instead of just 1. Returns the number of actions a single row contributes.
  const countColumn = detail ? sources[detail.sourceKey]?.countColumn : null;
  const rowActionCount = (row) => {
    if (!countColumn) return 1;
    const v = row[countColumn];
    if (v === undefined || v === null || v === '') return 0;
    const n = typeof v === 'number' ? v : parseFloat(String(v).replace(/,/g, ''));
    return isNaN(n) ? 0 : Math.max(0, Math.round(n));
  };

  const detailPreviewCols = detail
    ? findPreviewColumns(
        sources[detail.sourceKey].columns,
        sourceConfig[detail.sourceKey].previewHints,
        sources[detail.sourceKey].selectedColumn,
        sources[detail.sourceKey].countColumn
      )
    : [];

  return (
    <div
      ref={cardRef}
      className="fixed z-50 panel flex flex-col"
      style={{
        left: position.left,
        top: position.top,
        width: CARD_WIDTH,
        maxHeight: maxCardHeight,
        boxShadow: isDragging
          ? '0 32px 100px rgba(0,0,0,0.7), 0 0 0 1px rgba(96,165,250,0.35)'
          : '0 24px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(96,165,250,0.18)',
        animation: isDragging ? 'none' : 'fadeInCard 140ms ease-out',
        overflow: 'hidden',
        transition: isDragging ? 'none' : 'box-shadow 150ms ease'
      }}
      onClick={(e) => e.stopPropagation()}
    >
      <style>{`
        @keyframes fadeInCard {
          from { opacity: 0; transform: translateY(-4px) scale(0.98); }
          to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .pie-slice { cursor: pointer; transition: opacity 150ms ease; }
        .pie-slice:hover { opacity: 0.85; }
        /* Card body scrollbar — tailored for the panel background */
        .card-scroll::-webkit-scrollbar { width: 8px; }
        .card-scroll::-webkit-scrollbar-track { background: transparent; }
        .card-scroll::-webkit-scrollbar-thumb {
          background: rgba(255,255,255,0.08);
          border-radius: 8px;
          border: 2px solid transparent;
          background-clip: padding-box;
        }
        .card-scroll::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); background-clip: padding-box; border: 2px solid transparent; }
        .drag-grip {
          display: flex; gap: 3px; justify-content: center; align-items: center;
          opacity: 0.35; transition: opacity 150ms ease;
        }
        .drag-grip span {
          width: 4px; height: 4px; border-radius: 999px; background: #A1A1AA;
        }
        .drag-handle:hover .drag-grip { opacity: 0.7; }
      `}</style>

      {/* Drag handle strip */}
      <div
        className="drag-handle pt-2 pb-1 px-5 select-none"
        onMouseDown={onDragHandleMouseDown}
        style={{
          cursor: isDragging ? 'grabbing' : 'grab',
          flexShrink: 0
        }}
        title="Drag to move"
      >
        <div className="drag-grip">
          <span /><span /><span />
        </div>
      </div>

      {/* Header — also part of the drag handle */}
      <div
        className="drag-handle px-5 pb-3 flex items-center gap-3"
        onMouseDown={onDragHandleMouseDown}
        style={{
          flexShrink: 0,
          cursor: isDragging ? 'grabbing' : 'grab'
        }}
      >
        <div
          className="avatar w-10 h-10 text-[13px]"
          style={{
            background: `hsla(${hue}, 60%, 55%, 0.15)`,
            color: `hsl(${hue}, 70%, 70%)`,
            border: `1px solid hsla(${hue}, 60%, 55%, 0.3)`
          }}
        >
          {getInitials(person.name)}
        </div>
        <div className="flex-1 min-w-0 pointer-events-none">
          <div className="font-semibold text-[14px] truncate">{person.name}</div>
          <div className="text-[10.5px] uppercase tracking-[0.16em]" style={{ color: '#71717A' }}>
            {person.totalActions} actions · {person.points} pts
          </div>
        </div>
        <button
          onClick={onClose}
          onMouseDown={(e) => e.stopPropagation()}
          className="w-7 h-7 rounded-lg flex items-center justify-center transition-colors"
          style={{ background: 'rgba(255,255,255,0.04)', border: '1px solid var(--border-soft)', cursor: 'pointer' }}
          aria-label="Close"
        >
          <X size={14} style={{ color: '#A1A1AA' }} />
        </button>
      </div>

      {/* Scrollable body — three levels: pie → category → single action */}
      <div className="card-scroll px-5 pb-5 overflow-y-auto flex-1" style={{ minHeight: 0 }}>
        {!detail ? (
          <>
            {/* PIE VIEW */}
            {activeSegments.length > 0 ? (
              <>
                <div className="text-[10px] uppercase tracking-[0.22em] mb-1 mt-1" style={{ color: '#52525B' }}>
                  Click a slice for detail
                </div>
                <div style={{ height: 160 }} className="relative">
                  <ResponsiveContainer width="100%" height="100%">
                    <PieChart>
                      <Pie
                        data={activeSegments}
                        dataKey="value"
                        nameKey="name"
                        cx="50%"
                        cy="50%"
                        innerRadius={44}
                        outerRadius={70}
                        paddingAngle={activeSegments.length > 1 ? 3 : 0}
                        stroke="none"
                        isAnimationActive={false}
                        onClick={(d) => { if (d && d.pointsKey) onSelectSlice(d.pointsKey); }}
                      >
                        {activeSegments.map((entry, i) => (
                          <Cell
                            key={i}
                            fill={entry.color}
                            className="pie-slice"
                          />
                        ))}
                      </Pie>
                    </PieChart>
                  </ResponsiveContainer>
                  <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                    <div className="mono tabular text-[16px] font-semibold">{person.points}</div>
                    <div className="text-[9px] uppercase tracking-[0.2em]" style={{ color: '#71717A' }}>total</div>
                  </div>
                </div>
              </>
            ) : (
              <div className="text-center py-8 text-[12px]" style={{ color: '#71717A' }}>
                No activity yet
              </div>
            )}

            {/* Legend (also clickable) */}
            <div className="space-y-1 mt-3">
              {segments.map(s => {
                const isZero = s.value === 0;
                const isSalesforce = s.pointsKey === 'salesforceTicket';
                const sfBonusCount = isSalesforce ? (person.salesforceBonusCount || 0) : 0;
                const sfBaseCount = isSalesforce ? Math.max(0, s.count - sfBonusCount) : 0;
                return (
                  <button
                    key={s.pointsKey}
                    disabled={isZero}
                    onClick={() => onSelectSlice(s.pointsKey)}
                    className="w-full flex items-center justify-between text-[11.5px] px-2 py-1.5 rounded-md transition-colors"
                    style={{
                      opacity: isZero ? 0.35 : 1,
                      cursor: isZero ? 'default' : 'pointer',
                      background: 'transparent',
                      border: 'none',
                      color: 'inherit'
                    }}
                    onMouseEnter={e => { if (!isZero) e.currentTarget.style.background = 'rgba(255,255,255,0.03)'; }}
                    onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; }}
                  >
                    <div className="flex items-center gap-2 min-w-0">
                      <span className="w-2 h-2 rounded-full flex-shrink-0" style={{ background: s.color }} />
                      <span style={{ color: '#D4D4D8' }} className="truncate">{s.name}</span>
                      <span className="mono" style={{ color: '#52525B', fontSize: 10 }}>
                        {isSalesforce && sfBonusCount > 0
                          ? `${sfBaseCount}×${s.perAction}pt + ${sfBonusCount}×${SALESFORCE_BONUS_POINTS}pt`
                          : `${s.count} × ${s.perAction}pt`}
                      </span>
                    </div>
                    <span
                      className="mono tabular font-semibold"
                      style={{ color: isZero ? '#52525B' : '#F4F4F5' }}
                    >
                      {s.value}
                    </span>
                  </button>
                );
              })}
            </div>

            {person.aliases.length > 0 && (
              <div
                className="mt-4 pt-3 text-[10px]"
                style={{ borderTop: '1px solid var(--border-soft)', color: '#71717A' }}
              >
                <span style={{ color: '#52525B' }}>a.k.a. </span>
                {person.aliases.join(', ')}
              </div>
            )}
          </>
        ) : selectedActionIndex === null || selectedActionIndex === undefined ? (
          <>
            {/* CATEGORY VIEW — list of actions for a single source */}
            <button
              onClick={() => onSelectSlice(detail.pointsKey)}
              className="flex items-center gap-1.5 text-[11px] mt-1 mb-3 transition-colors"
              style={{ color: '#71717A', background: 'none', border: 'none', padding: 0, cursor: 'pointer' }}
              onMouseEnter={e => e.currentTarget.style.color = '#D4D4D8'}
              onMouseLeave={e => e.currentTarget.style.color = '#71717A'}
            >
              ← Back to breakdown
            </button>

            <div
              className="flex items-center justify-between p-3 rounded-lg mb-3"
              style={{
                background: `${detail.color}12`,
                border: `1px solid ${detail.color}33`
              }}
            >
              <div className="flex items-center gap-2.5">
                <span className="w-2.5 h-2.5 rounded-full" style={{ background: detail.color }} />
                <div>
                  <div className="text-[13px] font-medium">{detail.name}</div>
                  <div className="text-[10px] uppercase tracking-[0.16em]" style={{ color: '#71717A' }}>
                    {(() => {
                      const isSalesforce = detail.sourceKey === 'salesforce';
                      const sfBonusCount = isSalesforce ? (person.salesforceBonusCount || 0) : 0;
                      const sfBaseCount = isSalesforce ? Math.max(0, detail.count - sfBonusCount) : 0;
                      const actionWord = detail.count === 1
                        ? sourceConfig[detail.sourceKey].actionLabel
                        : sourceConfig[detail.sourceKey].actionLabelPlural;
                      if (isSalesforce && sfBonusCount > 0) {
                        return `${detail.count} ${actionWord} · ${sfBaseCount} × ${detail.perAction}pt + ${sfBonusCount} × ${SALESFORCE_BONUS_POINTS}pt bonus`;
                      }
                      return `${detail.count} ${actionWord} · ${detail.perAction}pt each`;
                    })()}
                  </div>
                </div>
              </div>
              <div className="text-right">
                <div className="mono tabular text-[20px] font-bold leading-none" style={{ color: detail.color }}>
                  {detail.value}
                </div>
                <div className="text-[9px] uppercase tracking-wider mt-0.5" style={{ color: '#71717A' }}>pts</div>
              </div>
            </div>

            {/* Clickable action list */}
            {detailActions.length > 0 ? (
              <>
                <div className="text-[9.5px] uppercase tracking-[0.22em] mb-2" style={{ color: '#52525B' }}>
                  Click for full details
                </div>
                <div className="space-y-1.5">
                  {detailActions.map((row, i) => {
                    // For summary files: show name as primary, count as secondary
                    // For log files: show preview column (topic, subject, etc)
                    const primary = countColumn
                      ? row[sources[detail.sourceKey].selectedColumn]
                      : (detailPreviewCols[0] ? row[detailPreviewCols[0]] : null);
                    const secondary = countColumn
                      ? `${row[countColumn] || 0} ${sourceConfig[detail.sourceKey].actionLabelPlural}`
                      : detailPreviewCols
                          .slice(1)
                          .map(c => row[c])
                          .filter(v => v !== null && v !== undefined && v !== '')
                          .join(' · ');
                    const rowCount = rowActionCount(row);
                    // Salesforce tickets can earn a bonus when Category Details
                    // matches known high-impact buckets (Login Issue, AD Connector).
                    const sfBonus = detail.sourceKey === 'salesforce' ? classifySalesforceBonus(row) : null;
                    const rowPoints = sfBonus
                      ? SALESFORCE_BONUS_POINTS
                      : rowCount * detail.perAction;
                    return (
                      <button
                        key={i}
                        onClick={() => onActionSelect(i)}
                        onMouseDown={(e) => e.stopPropagation()}
                        className="w-full text-left flex items-start justify-between gap-3 px-2.5 py-2 rounded-md transition-all"
                        style={{
                          background: 'rgba(255,255,255,0.015)',
                          border: '1px solid var(--border-soft)',
                          cursor: 'pointer'
                        }}
                        onMouseEnter={e => {
                          e.currentTarget.style.background = 'rgba(255,255,255,0.04)';
                          e.currentTarget.style.borderColor = `${detail.color}44`;
                        }}
                        onMouseLeave={e => {
                          e.currentTarget.style.background = 'rgba(255,255,255,0.015)';
                          e.currentTarget.style.borderColor = 'var(--border-soft)';
                        }}
                      >
                        <div className="flex-1 min-w-0">
                          <div
                            className="text-[12px] leading-tight truncate flex items-center gap-1.5"
                            style={{ color: '#E4E4E7' }}
                            title={String(primary || '')}
                          >
                            <span className="truncate">
                              {primary || <span style={{ color: '#52525B' }}>—</span>}
                            </span>
                            {sfBonus && (
                              <span
                                className="flex-shrink-0 inline-flex items-center gap-0.5 px-1 py-0.5 rounded text-[9px] uppercase tracking-wider"
                                style={{
                                  background: `${detail.color}22`,
                                  color: detail.color,
                                  border: `1px solid ${detail.color}55`
                                }}
                                title={sfBonus.evidence}
                              >
                                <Flame size={8} /> bonus
                              </span>
                            )}
                          </div>
                          {secondary && (
                            <div
                              className="mono text-[10px] mt-1 truncate"
                              style={{ color: '#71717A' }}
                              title={secondary}
                            >
                              {secondary}
                            </div>
                          )}
                        </div>
                        <div
                          className="mono tabular text-[11px] font-semibold flex-shrink-0 px-1.5 py-0.5 rounded"
                          style={{ color: detail.color, background: `${detail.color}15` }}
                          title={sfBonus ? `AD Connector bonus: ${SALESFORCE_BONUS_POINTS} pts` : (countColumn ? `${rowCount} × ${detail.perAction}pt` : undefined)}
                        >
                          +{rowPoints}
                        </div>
                      </button>
                    );
                  })}
                </div>
              </>
            ) : (
              <div className="text-center py-6 text-[12px]" style={{ color: '#71717A' }}>
                No {sourceConfig[detail.sourceKey].actionLabelPlural} found for this person
              </div>
            )}
          </>
        ) : (
          <>
            {/* ACTION DETAIL VIEW — all fields of a single row */}
            {(() => {
              const action = detailActions[selectedActionIndex];
              if (!action) {
                return (
                  <div className="text-center py-6 text-[12px]" style={{ color: '#71717A' }}>
                    This entry is no longer available.
                  </div>
                );
              }
              // All fields in column order, filtering empty values
              const allCols = sources[detail.sourceKey].columns || [];
              const fields = allCols
                .map(col => ({ col, value: action[col] }))
                .filter(f => f.value !== null && f.value !== undefined && String(f.value).trim() !== '');

              const isUrl = (v) => typeof v === 'string' && /^https?:\/\//i.test(v.trim());

              return (
                <>
                  <button
                    onClick={onActionBack}
                    onMouseDown={(e) => e.stopPropagation()}
                    className="flex items-center gap-1.5 text-[11px] mt-1 mb-3 transition-colors"
                    style={{ color: '#71717A', background: 'none', border: 'none', padding: 0, cursor: 'pointer' }}
                    onMouseEnter={e => e.currentTarget.style.color = '#D4D4D8'}
                    onMouseLeave={e => e.currentTarget.style.color = '#71717A'}
                  >
                    ← Back to {sourceConfig[detail.sourceKey].actionLabelPlural}
                  </button>

                  {/* Summary strip */}
                  <div
                    className="flex items-center justify-between p-3 rounded-lg mb-4"
                    style={{
                      background: `${detail.color}12`,
                      border: `1px solid ${detail.color}33`
                    }}
                  >
                    <div className="flex items-center gap-2.5 min-w-0">
                      <span className="w-2.5 h-2.5 rounded-full flex-shrink-0" style={{ background: detail.color }} />
                      <div className="min-w-0">
                        <div className="text-[10px] uppercase tracking-[0.16em] flex items-center gap-1.5" style={{ color: '#71717A' }}>
                          <span>{sourceConfig[detail.sourceKey].label} · #{selectedActionIndex + 1} of {detailActions.length}</span>
                          {(() => {
                            const sfBonus = detail.sourceKey === 'salesforce' ? classifySalesforceBonus(action) : null;
                            return sfBonus ? (
                              <span
                                className="inline-flex items-center gap-0.5 px-1 py-0.5 rounded normal-case tracking-normal"
                                style={{
                                  background: `${detail.color}22`,
                                  color: detail.color,
                                  border: `1px solid ${detail.color}55`,
                                  fontSize: 9,
                                  letterSpacing: '0.05em'
                                }}
                                title={sfBonus.evidence}
                              >
                                <Flame size={9} /> AD Connector bonus
                              </span>
                            ) : null;
                          })()}
                        </div>
                        <div className="text-[12px] font-medium truncate mt-0.5">
                          {countColumn
                            ? `${rowActionCount(action)} ${sourceConfig[detail.sourceKey].actionLabelPlural}`
                            : `${detail.name} entry`}
                        </div>
                      </div>
                    </div>
                    <div
                      className="mono tabular text-[13px] font-semibold flex-shrink-0 px-2 py-1 rounded"
                      style={{ color: detail.color, background: `${detail.color}15` }}
                      title={(() => {
                        const sfBonus = detail.sourceKey === 'salesforce' ? classifySalesforceBonus(action) : null;
                        if (sfBonus) return `AD Connector bonus: ${SALESFORCE_BONUS_POINTS} pts`;
                        if (countColumn) return `${rowActionCount(action)} × ${detail.perAction}pt`;
                        return undefined;
                      })()}
                    >
                      +{(() => {
                        const sfBonus = detail.sourceKey === 'salesforce' ? classifySalesforceBonus(action) : null;
                        if (sfBonus) return SALESFORCE_BONUS_POINTS;
                        return rowActionCount(action) * detail.perAction;
                      })()} pts
                    </div>
                  </div>

                  {/* Prev/Next navigation */}
                  {detailActions.length > 1 && (
                    <div className="flex items-center justify-between mb-4 text-[11px]">
                      <button
                        onClick={() => onActionSelect((selectedActionIndex - 1 + detailActions.length) % detailActions.length)}
                        onMouseDown={(e) => e.stopPropagation()}
                        className="btn"
                        style={{ padding: '6px 10px', fontSize: 11 }}
                      >
                        ← Prev
                      </button>
                      <span style={{ color: '#52525B' }}>
                        {selectedActionIndex + 1} / {detailActions.length}
                      </span>
                      <button
                        onClick={() => onActionSelect((selectedActionIndex + 1) % detailActions.length)}
                        onMouseDown={(e) => e.stopPropagation()}
                        className="btn"
                        style={{ padding: '6px 10px', fontSize: 11 }}
                      >
                        Next →
                      </button>
                    </div>
                  )}

                  {/* Full field list */}
                  <div className="space-y-2.5">
                    {fields.map(({ col, value }) => {
                      const strVal = String(value);
                      const isLong = strVal.length > 60;
                      const url = isUrl(strVal) ? strVal.trim() : null;
                      return (
                        <div key={col}>
                          <div className="text-[9.5px] uppercase tracking-[0.18em] mb-1" style={{ color: '#71717A' }}>
                            {col}
                          </div>
                          {url ? (
                            <a
                              href={url}
                              target="_blank"
                              rel="noopener noreferrer"
                              onMouseDown={(e) => e.stopPropagation()}
                              className="text-[12px] break-all hover:underline"
                              style={{ color: '#60A5FA' }}
                            >
                              {strVal}
                            </a>
                          ) : (
                            <div
                              className="text-[12.5px] leading-relaxed"
                              style={{
                                color: '#E4E4E7',
                                wordBreak: 'break-word',
                                whiteSpace: isLong ? 'pre-wrap' : 'normal'
                              }}
                            >
                              {strVal}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </>
              );
            })()}
          </>
        )}
      </div>
    </div>
  );
}
/* ---------- Sub-component: Weekly Trends page ---------- */

function TrendsPage({ hasData, weeklyTrends, onLoadSample, onGoImport }) {
  // Highlight one person on hover/click in the legend
  const [focusedKey, setFocusedKey] = useState(null);

  if (!hasData) {
    return (
      <section className="panel p-12 text-center">
        <div
          className="w-14 h-14 rounded-2xl mx-auto mb-5 flex items-center justify-center"
          style={{ background: 'rgba(96,165,250,0.08)', border: '1px solid rgba(96,165,250,0.2)' }}
        >
          <TrendingUp size={26} style={{ color: '#60A5FA' }} />
        </div>
        <h3 className="text-[22px] font-medium mb-2">
          No <span className="serif italic" style={{ color: '#60A5FA' }}>trend data</span> yet
        </h3>
        <p className="text-[14px] max-w-md mx-auto mb-6" style={{ color: '#A1A1AA' }}>
          Upload monthly reports with date columns (e.g., "Date Opened", "Start Time") and the chart will plot each person's cumulative points by week.
        </p>
        <div className="flex items-center justify-center gap-2">
          <button className="btn btn-primary" onClick={onLoadSample}>
            <Sparkles size={14} /> Load sample data
          </button>
          <button className="btn" onClick={onGoImport}>
            <Upload size={14} /> Go to import
          </button>
        </div>
      </section>
    );
  }

  const { weeks, series, missingSources } = weeklyTrends;

  if (weeks.length === 0) {
    return (
      <>
        <section className="panel p-10 text-center">
          <div
            className="w-14 h-14 rounded-2xl mx-auto mb-5 flex items-center justify-center"
            style={{ background: 'rgba(245,184,65,0.08)', border: '1px solid rgba(245,184,65,0.22)' }}
          >
            <AlertCircle size={26} style={{ color: '#F5B841' }} />
          </div>
          <h3 className="text-[20px] font-medium mb-2">Couldn't find dated activity</h3>
          <p className="text-[13.5px] max-w-lg mx-auto mb-4" style={{ color: '#A1A1AA' }}>
            None of your imported files have a date column detected. To see weekly trends, each source needs a column containing per-row dates (e.g., "Date Opened", "Start Time", "Start Date &amp; Time").
          </p>
          {missingSources.length > 0 && (
            <p className="text-[12px]" style={{ color: '#71717A' }}>
              Missing dates for: <span style={{ color: '#F4F4F5' }}>{missingSources.join(', ')}</span>
            </p>
          )}
          <button className="btn mt-5" onClick={onGoImport}>
            <Upload size={14} /> Adjust imports
          </button>
        </section>
      </>
    );
  }

  // Build recharts-shaped data: [{ week: 'Apr 13', personKeyA: 120, personKeyB: 75, ... }, ...]
  const chartData = weeks.map(w => {
    const entry = { week: w.label, weekKey: w.key };
    for (const s of series) {
      entry[s.key] = s.points[w.key];
    }
    return entry;
  });

  // Ranked series for the sidebar (by final total)
  const rankedSeries = [...series].sort((a, b) => b.finalPoints - a.finalPoints);

  const yMax = Math.max(...series.map(s => s.finalPoints), 10);

  return (
    <>
      {/* Warning banner for sources missing dates */}
      {missingSources.length > 0 && (
        <div
          className="panel-inset p-4 mb-6 flex items-start gap-3"
          style={{ background: 'rgba(245,184,65,0.06)', border: '1px solid rgba(245,184,65,0.2)' }}
        >
          <AlertCircle size={16} style={{ color: '#F5B841', flexShrink: 0, marginTop: 2 }} />
          <div className="text-[12px]" style={{ color: '#D4D4D8' }}>
            <div className="font-medium mb-1">Some sources aren't on the timeline</div>
            <div style={{ color: '#A1A1AA' }}>
              <span style={{ color: '#F4F4F5' }}>{missingSources.join(', ')}</span>{' '}
              couldn't be placed on the chart because no date column was detected.
              Pick one in the Import page to include it here.
            </div>
          </div>
        </div>
      )}

      <section className="grid grid-cols-1 lg:grid-cols-4 gap-5">
        {/* Chart — takes most of the width */}
        <div className="panel p-6 lg:col-span-3">
          <div className="flex items-start justify-between mb-5">
            <div>
              <div className="text-[10.5px] uppercase tracking-[0.22em]" style={{ color: '#71717A' }}>
                Cumulative points
              </div>
              <div className="text-[19px] font-medium mt-0.5">The race</div>
            </div>
            <div className="text-[11px]" style={{ color: '#52525B' }}>
              {weeks.length} {weeks.length === 1 ? 'week' : 'weeks'} · {series.length} {series.length === 1 ? 'person' : 'people'}
            </div>
          </div>

          <div style={{ height: 420 }}>
            <ResponsiveContainer width="100%" height="100%">
              <LineChart
                data={chartData}
                margin={{ top: 10, right: 30, left: 0, bottom: 0 }}
              >
                <CartesianGrid stroke="rgba(255,255,255,0.04)" vertical={false} />
                <XAxis
                  dataKey="week"
                  tick={{ fill: '#A1A1AA', fontSize: 11 }}
                  axisLine={{ stroke: '#232327' }}
                  tickLine={false}
                  padding={{ left: 10, right: 10 }}
                />
                <YAxis
                  tick={{ fill: '#71717A', fontSize: 11 }}
                  axisLine={false}
                  tickLine={false}
                  domain={[0, Math.ceil(yMax * 1.05 / 50) * 50 || 50]}
                  width={48}
                />
                <Tooltip
                  cursor={{ stroke: 'rgba(96,165,250,0.3)', strokeWidth: 1, strokeDasharray: '3 3' }}
                  contentStyle={{
                    background: '#111113',
                    border: '1px solid #232327',
                    borderRadius: 10,
                    fontSize: 12,
                    fontFamily: 'Geist, sans-serif',
                    padding: '10px 12px'
                  }}
                  itemStyle={{ color: '#F4F4F5', padding: '2px 0' }}
                  labelStyle={{ color: '#A1A1AA', marginBottom: 6, fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.1em' }}
                  formatter={(value, name) => {
                    const s = series.find(s => s.key === name);
                    return [`${value} pts`, s ? s.name : name];
                  }}
                  itemSorter={(item) => -item.value}
                />
                {series.map(s => {
                  const isFocused = focusedKey === s.key;
                  const isDimmed = focusedKey !== null && !isFocused;
                  return (
                    <Line
                      key={s.key}
                      type="monotone"
                      dataKey={s.key}
                      name={s.key}
                      stroke={s.color}
                      strokeWidth={isFocused ? 3 : 2}
                      strokeOpacity={isDimmed ? 0.15 : 1}
                      dot={{ r: isFocused ? 4 : 3, strokeWidth: 0, fill: s.color, fillOpacity: isDimmed ? 0.15 : 1 }}
                      activeDot={{ r: 5, strokeWidth: 2, stroke: '#09090B' }}
                      isAnimationActive={false}
                    />
                  );
                })}
              </LineChart>
            </ResponsiveContainer>
          </div>
        </div>

        {/* Ranked legend */}
        <div className="panel p-5 lg:col-span-1">
          <div className="text-[10.5px] uppercase tracking-[0.22em] mb-3" style={{ color: '#71717A' }}>
            Current standings
          </div>
          <div className="space-y-1 max-h-[420px] overflow-y-auto card-scroll -mr-2 pr-2">
            {rankedSeries.map((s, i) => {
              const isFocused = focusedKey === s.key;
              const isDimmed = focusedKey !== null && !isFocused;
              return (
                <button
                  key={s.key}
                  onMouseEnter={() => setFocusedKey(s.key)}
                  onMouseLeave={() => setFocusedKey(null)}
                  onClick={() => setFocusedKey(prev => prev === s.key ? null : s.key)}
                  className="w-full flex items-center gap-2.5 px-2 py-2 rounded-lg text-left transition-colors"
                  style={{
                    background: isFocused ? 'rgba(96,165,250,0.06)' : 'transparent',
                    border: isFocused ? '1px solid rgba(96,165,250,0.2)' : '1px solid transparent',
                    opacity: isDimmed ? 0.4 : 1,
                    cursor: 'pointer'
                  }}
                >
                  <span
                    className="mono tabular text-[10.5px] font-semibold w-5"
                    style={{ color: i === 0 ? '#F5B841' : i < 3 ? '#A1A1AA' : '#52525B' }}
                  >
                    {String(i + 1).padStart(2, '0')}
                  </span>
                  <span
                    className="w-2.5 h-2.5 rounded-full flex-shrink-0"
                    style={{ background: s.color }}
                  />
                  <span className="flex-1 min-w-0 text-[12.5px] font-medium truncate">
                    {s.name}
                  </span>
                  <span className="mono tabular text-[12px] font-semibold" style={{ color: '#F4F4F5' }}>
                    {s.finalPoints}
                  </span>
                </button>
              );
            })}
          </div>
          <div className="mt-4 pt-3 text-[10px]" style={{ borderTop: '1px solid var(--border-soft)', color: '#52525B' }}>
            Hover a row to highlight their line on the chart. Click to pin.
          </div>
        </div>
      </section>
    </>
  );
}

/* ---------- Sub-component: Duplicates page ---------- */

function DuplicatesPage({
  details,                // Zoom↔Calendly match details
  salesforceDetails,      // Salesforce→{Calendly|Zoom} match details
  calendlyRows, zoomRows, salesforceRows,
  calendlyConfig, zoomConfig, salesforceConfig,
  sources, onGoImport
}) {
  // Modal state — one row inspected at a time
  const [inspectingRow, setInspectingRow] = useState(null);

  const hasAnySources = sources.calendly.rows.length > 0 || sources.zoom.rows.length > 0 || sources.salesforce.rows.length > 0;
  const totalDuplicates = (details?.length || 0) + (salesforceDetails?.length || 0);

  if (!hasAnySources) {
    return (
      <section className="panel p-12 text-center">
        <div
          className="w-14 h-14 rounded-2xl mx-auto mb-5 flex items-center justify-center"
          style={{ background: 'rgba(96,165,250,0.08)', border: '1px solid rgba(96,165,250,0.2)' }}
        >
          <AlertCircle size={26} style={{ color: '#60A5FA' }} />
        </div>
        <h3 className="text-[22px] font-medium mb-2">
          Nothing to <span className="serif italic" style={{ color: '#60A5FA' }}>audit</span> yet
        </h3>
        <p className="text-[14px] max-w-md mx-auto mb-6" style={{ color: '#A1A1AA' }}>
          Duplicate detection compares Salesforce cases, Zoom meetings, and Calendly bookings. Upload sources from the Import page to see matches here.
        </p>
        <button className="btn" onClick={onGoImport}>
          <Upload size={14} /> Go to import
        </button>
      </section>
    );
  }

  if (totalDuplicates === 0) {
    return (
      <section className="panel p-10 text-center">
        <div
          className="w-14 h-14 rounded-2xl mx-auto mb-5 flex items-center justify-center"
          style={{ background: 'rgba(34,197,94,0.08)', border: '1px solid rgba(34,197,94,0.22)' }}
        >
          <Check size={26} style={{ color: '#22C55E' }} />
        </div>
        <h3 className="text-[20px] font-medium mb-2">No duplicates detected</h3>
        <p className="text-[13.5px] max-w-lg mx-auto" style={{ color: '#A1A1AA' }}>
          None of your records matched across sources by case number or district name within 30 minutes. Each action is being counted once.
        </p>
      </section>
    );
  }

  // Tallies
  const caseMatches = (details || []).filter(d => d.reason === 'case').length;
  const districtMatches = (details || []).filter(d => d.reason === 'district').length;
  const sfToCalendly = (salesforceDetails || []).filter(d => d.matchedIn === 'calendly').length;
  const sfToZoom = (salesforceDetails || []).filter(d => d.matchedIn === 'zoom').length;

  // Field fetchers
  const calField = (idx, field) => calendlyRows[idx]?.[field] || '';
  const zoomField = (idx, field) => zoomRows[idx]?.[field] || '';
  const sfField = (idx, field) => salesforceRows[idx]?.[field] || '';

  const calCaseNumberSlot = (idx) => {
    const row = calendlyRows[idx];
    if (!row) return null;
    for (let i = 1; i <= 5; i++) {
      const q = (row[`Question ${i}`] || '').toLowerCase();
      if (q.includes('case')) {
        return { question: row[`Question ${i}`], response: row[`Response ${i}`] };
      }
    }
    return null;
  };

  const fmtDelta = (ms) => {
    if (ms === null || ms === undefined) return '—';
    const mins = Math.round(ms / 60000);
    if (mins === 0) return 'same start';
    if (mins === 1) return '1 min off';
    return `${mins} min off`;
  };

  const fmtDate = (raw) => {
    const d = parseDateFlexible(raw);
    if (!d) return String(raw || '');
    return d.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
  };

  // Normalize every duplicate (Zoom↔Calendly + Salesforce→meeting) into a
  // unified row shape so we can render one table.
  //   hiddenSource:  which source's row is being skipped (with accent color)
  //   hiddenRow:     field values for that skipped row
  //   keptSource:    which source keeps the point
  //   keptRow:       field values for the kept row
  //   reason:        'case' | 'district'
  //   reasonDetail:  object with extra info (matchedCase, matchedDistrict, etc.)
  const unifiedRows = [];

  for (const d of (details || [])) {
    unifiedRows.push({
      kind: 'zoomDup',
      host: calField(d.calendlyIndex, 'User Name') || calField(d.calendlyIndex, 'Host') || zoomField(d.zoomIndex, 'Host'),
      hidden: {
        sourceKey: 'zoom',
        sourceLabel: zoomConfig.label,
        accent: zoomConfig.accent,
        row: zoomRows[d.zoomIndex],
        title: zoomField(d.zoomIndex, 'Topic') || '(no topic)',
        subtitle: null,
        date: zoomField(d.zoomIndex, 'Start Time'),
      },
      kept: {
        sourceKey: 'calendly',
        sourceLabel: calendlyConfig.label,
        accent: calendlyConfig.accent,
        row: calendlyRows[d.calendlyIndex],
        title: calField(d.calendlyIndex, 'Event Type Name') || calField(d.calendlyIndex, 'Event Type') || '(no event type)',
        subtitle: calField(d.calendlyIndex, 'Invitee Name') || calField(d.calendlyIndex, 'Invitee') || null,
        date: calField(d.calendlyIndex, 'Start Date & Time'),
      },
      reason: d.reason,
      reasonDetail: {
        matchedCase: d.matchedCase,
        matchedDistrict: d.matchedDistrict,
        calCaseSlot: d.reason === 'case' ? calCaseNumberSlot(d.calendlyIndex) : null,
      },
      deltaMs: d.deltaMs,
    });
  }

  for (const d of (salesforceDetails || [])) {
    const sfIdx = d.salesforceIndex;
    if (d.matchedIn === 'calendly') {
      unifiedRows.push({
        kind: 'sfToCal',
        host: sfField(sfIdx, 'Case Owner') || calField(d.calendlyIndex, 'User Name'),
        hidden: {
          sourceKey: 'salesforce',
          sourceLabel: salesforceConfig.label,
          accent: salesforceConfig.accent,
          row: salesforceRows[sfIdx],
          title: sfField(sfIdx, 'Subject') || `Case #${d.matchedCase}`,
          subtitle: `Case #${sfField(sfIdx, 'Case Number') || d.matchedCase}`,
          date: sfField(sfIdx, 'Date/Time Opened'),
        },
        kept: {
          sourceKey: 'calendly',
          sourceLabel: calendlyConfig.label,
          accent: calendlyConfig.accent,
          row: calendlyRows[d.calendlyIndex],
          title: calField(d.calendlyIndex, 'Event Type Name') || calField(d.calendlyIndex, 'Event Type') || '(no event type)',
          subtitle: calField(d.calendlyIndex, 'Invitee Name') || null,
          date: calField(d.calendlyIndex, 'Start Date & Time'),
        },
        reason: 'case',
        reasonDetail: {
          matchedCase: d.matchedCase,
          calCaseSlot: calCaseNumberSlot(d.calendlyIndex),
        },
        deltaMs: null, // no time comparison for Salesforce matches
      });
    } else {
      unifiedRows.push({
        kind: 'sfToZoom',
        host: sfField(sfIdx, 'Case Owner') || zoomField(d.zoomIndex, 'Host'),
        hidden: {
          sourceKey: 'salesforce',
          sourceLabel: salesforceConfig.label,
          accent: salesforceConfig.accent,
          row: salesforceRows[sfIdx],
          title: sfField(sfIdx, 'Subject') || `Case #${d.matchedCase}`,
          subtitle: `Case #${sfField(sfIdx, 'Case Number') || d.matchedCase}`,
          date: sfField(sfIdx, 'Date/Time Opened'),
        },
        kept: {
          sourceKey: 'zoom',
          sourceLabel: zoomConfig.label,
          accent: zoomConfig.accent,
          row: zoomRows[d.zoomIndex],
          title: zoomField(d.zoomIndex, 'Topic') || '(no topic)',
          subtitle: null,
          date: zoomField(d.zoomIndex, 'Start Time'),
        },
        reason: 'case',
        reasonDetail: {
          matchedCase: d.matchedCase,
          calCaseSlot: null,
        },
        deltaMs: null,
      });
    }
  }

  // Reusable clickable cell that opens the row detail modal
  const RowCell = ({ side, maxWidth = 280 }) => {
    const hoverColor = `${side.accent}0D`; // ~5% alpha
    return (
      <button
        type="button"
        onClick={() => setInspectingRow({
          sourceLabel: side.sourceLabel,
          accent: side.accent,
          row: side.row,
          title: side.title,
          subtitle: side.subtitle
        })}
        className="text-left w-full -mx-1 px-1 py-1 rounded transition-colors"
        style={{ cursor: 'pointer' }}
        onMouseEnter={(e) => e.currentTarget.style.background = hoverColor}
        onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}
        title={`Click to view full ${side.sourceLabel} details`}
      >
        <div className="flex flex-col gap-0.5 min-w-0" style={{ maxWidth }}>
          <div className="flex items-center gap-1.5 mb-0.5">
            <span className="w-1.5 h-1.5 rounded-full flex-shrink-0" style={{ background: side.accent }} />
            <span className="text-[9.5px] uppercase tracking-[0.14em]" style={{ color: '#71717A' }}>
              {side.sourceLabel}
            </span>
          </div>
          <span className="truncate" style={{ color: '#F4F4F5' }}>{side.title}</span>
          {side.subtitle && (
            <span className="text-[11px] truncate" style={{ color: '#A1A1AA' }}>
              {side.subtitle}
            </span>
          )}
          <span className="mono text-[10.5px]" style={{ color: '#71717A' }}>
            {fmtDate(side.date)}
          </span>
        </div>
      </button>
    );
  };

  return (
    <>
      {/* Summary strip */}
      <section className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
        <div className="panel p-5">
          <div className="text-[10.5px] uppercase tracking-[0.22em]" style={{ color: '#71717A' }}>Total duplicates</div>
          <div className="mono tabular text-[32px] font-medium mt-1" style={{ color: '#60A5FA' }}>
            {totalDuplicates}
          </div>
          <div className="text-[11px] mt-1" style={{ color: '#A1A1AA' }}>
            Records hidden to avoid double-counting
          </div>
        </div>
        <div className="panel p-5">
          <div className="text-[10.5px] uppercase tracking-[0.22em]" style={{ color: '#71717A' }}>Zoom ↔ Calendly</div>
          <div className="mono tabular text-[26px] font-medium mt-1" style={{ color: '#F4F4F5' }}>
            {caseMatches + districtMatches}
          </div>
          <div className="text-[11px] mt-1" style={{ color: '#A1A1AA' }}>
            {caseMatches} by case · {districtMatches} by district
          </div>
        </div>
        <div className="panel p-5">
          <div className="text-[10.5px] uppercase tracking-[0.22em]" style={{ color: '#71717A' }}>Salesforce → Calendly</div>
          <div className="mono tabular text-[26px] font-medium mt-1" style={{ color: '#F4F4F5' }}>
            {sfToCalendly}
          </div>
          <div className="text-[11px] mt-1" style={{ color: '#A1A1AA' }}>
            Case also booked on Calendly
          </div>
        </div>
        <div className="panel p-5">
          <div className="text-[10.5px] uppercase tracking-[0.22em]" style={{ color: '#71717A' }}>Salesforce → Zoom</div>
          <div className="mono tabular text-[26px] font-medium mt-1" style={{ color: '#F4F4F5' }}>
            {sfToZoom}
          </div>
          <div className="text-[11px] mt-1" style={{ color: '#A1A1AA' }}>
            Case addressed in a Zoom meeting
          </div>
        </div>
      </section>

      {/* Unified duplicates table */}
      <section className="panel p-6">
        <div className="flex items-start justify-between gap-4 mb-4">
          <div>
            <div className="text-[10.5px] uppercase tracking-[0.22em]" style={{ color: '#71717A' }}>Detections</div>

          <table className="w-full text-[12.5px]">
            <thead>
              <tr className="text-[10.5px] uppercase tracking-[0.16em]" style={{ color: '#71717A' }}>
                <th className="text-left font-medium pb-3 px-3 whitespace-nowrap">Host</th>
                <th className="text-left font-medium pb-3 px-3 whitespace-nowrap">Hidden (no point)</th>
                <th className="text-left font-medium pb-3 px-3 whitespace-nowrap">Kept (counted)</th>
                <th className="text-left font-medium pb-3 px-3 whitespace-nowrap">Why matched</th>
                <th className="text-right font-medium pb-3 px-3 whitespace-nowrap">Time diff</th>
              </tr>
            </thead>
            <tbody>
              {unifiedRows.map((u, i) => (
                <tr key={i} className="border-t" style={{ borderColor: '#1C1C20' }}>
                  <td className="py-3.5 px-3 align-top whitespace-nowrap">
                    <span className="font-medium">{u.host || '—'}</span>
                  </td>
                  <td className="py-3.5 px-3 align-top">
                    <RowCell side={u.hidden} maxWidth={300} />
                  </td>
                  <td className="py-3.5 px-3 align-top">
                    <RowCell side={u.kept} maxWidth={300} />
                  </td>
                  <td className="py-3.5 px-3 align-top">
                    {u.reason === 'case' ? (
                      <div className="flex flex-col gap-1 max-w-[260px]">
                        <span
                          className="inline-flex items-center gap-1 px-1.5 py-0.5 rounded mono tabular text-[10.5px] self-start"
                          style={{ background: 'rgba(96,165,250,0.10)', color: '#60A5FA', border: '1px solid rgba(96,165,250,0.25)' }}
                        >
                          Case #{u.reasonDetail.matchedCase}
                        </span>
                        {u.reasonDetail.calCaseSlot && (
                          <span className="text-[10.5px] leading-tight" style={{ color: '#A1A1AA' }}>
                            Calendly Q: <span style={{ color: '#D4D4D8' }}>{u.reasonDetail.calCaseSlot.question}</span>
                          </span>
                        )}
                        <span className="text-[10.5px] leading-tight" style={{ color: '#A1A1AA' }}>
                          Same case number in both records.
                        </span>
                      </div>
                    ) : (
                      <div className="flex flex-col gap-1 max-w-[260px]">
                        <span
                          className="inline-flex items-center gap-1 px-1.5 py-0.5 rounded text-[10.5px] self-start"
                          style={{ background: 'rgba(34,197,94,0.10)', color: '#22C55E', border: '1px solid rgba(34,197,94,0.25)' }}
                        >
                          District name
                        </span>
                        <span className="text-[10.5px] leading-tight" style={{ color: '#A1A1AA' }}>
                          Calendly: <span style={{ color: '#D4D4D8' }}>"{u.reasonDetail.matchedDistrict}"</span>
                        </span>
                        <span className="text-[10.5px] leading-tight" style={{ color: '#A1A1AA' }}>
                          Appears in Zoom topic above.
                        </span>
                      </div>
                    )}
                  </td>
                  <td className="py-3.5 px-3 align-top text-right mono tabular whitespace-nowrap" style={{ color: '#A1A1AA' }}>
                    {fmtDelta(u.deltaMs)}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        <div className="mt-5 pt-4 text-[11px]" style={{ borderTop: '1px solid var(--border-soft)', color: '#71717A' }}>
          Priority order: Calendly &gt; Zoom &gt; Salesforce. A Zoom meeting is hidden when a Calendly booking exists for the same case or district (within 30 min). A Salesforce case is hidden when its number appears in a Calendly booking or a non-duplicate Zoom meeting.
        </div>
      </section>

      {inspectingRow && (
        <RowDetailModal
          sourceLabel={inspectingRow.sourceLabel}
          accent={inspectingRow.accent}
          row={inspectingRow.row}
          title={inspectingRow.title}
          subtitle={inspectingRow.subtitle}
          onClose={() => setInspectingRow(null)}
        />
      )}
    </>
  );
}


/* ---------- Sub-component: Row detail modal ----------
 * A centered overlay modal that shows every field of a single imported row
 * as key/value pairs. Used from the Duplicates page to let you audit
 * exactly what Tally saw in the Calendly / Zoom export for a given match.
 */
function RowDetailModal({ sourceLabel, accent, row, title, subtitle, onClose }) {
  // Escape closes
  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [onClose]);

  // Entries where there's a value worth showing
  const entries = Object.entries(row || {}).filter(([, v]) => v !== null && v !== undefined && v !== '');

  // Click-outside to close
  const onBackdropClick = (e) => {
    if (e.target === e.currentTarget) onClose();
  };

  return (
    <div
      onClick={onBackdropClick}
      className="fixed inset-0 z-50 flex items-center justify-center p-4"
      style={{ background: 'rgba(0,0,0,0.65)', backdropFilter: 'blur(4px)' }}
    >
      <div
        className="panel w-full max-w-2xl flex flex-col"
        style={{ maxHeight: '80vh', background: '#111113', border: `1px solid ${accent}33` }}
        onClick={(e) => e.stopPropagation()}
      >
        {/* Header */}
        <div
          className="flex items-start justify-between gap-3 p-5"
          style={{ borderBottom: '1px solid var(--border-soft)' }}
        >
          <div className="min-w-0 flex-1">
            <div className="flex items-center gap-2 mb-1">
              <span className="w-2 h-2 rounded-full flex-shrink-0" style={{ background: accent }} />
              <span className="text-[10.5px] uppercase tracking-[0.18em]" style={{ color: '#71717A' }}>
                {sourceLabel} entry
              </span>
            </div>
            <div className="text-[17px] font-medium leading-tight truncate" title={title}>
              {title}
            </div>
            {subtitle && (
              <div className="text-[12.5px] mt-0.5 truncate" style={{ color: '#A1A1AA' }} title={subtitle}>
                {subtitle}
              </div>
            )}
          </div>
          <button
            className="btn-ghost btn p-1.5 flex-shrink-0"
            onClick={onClose}
            title="Close (Esc)"
          >
            <X size={16} style={{ color: '#A1A1AA' }} />
          </button>
        </div>

        {/* Scrollable field list */}
        <div className="overflow-y-auto px-5 py-4 card-scroll">
          {entries.length === 0 ? (
            <div className="text-center py-6 text-[13px]" style={{ color: '#71717A' }}>
              This row has no populated fields.
            </div>
          ) : (
            <div className="grid grid-cols-1 gap-3">
              {entries.map(([key, value]) => {
                const str = String(value);
                const isUrl = /^https?:\/\//i.test(str);
                return (
                  <div
                    key={key}
                    className="grid gap-1"
                    style={{ gridTemplateColumns: 'minmax(140px, 220px) 1fr', alignItems: 'baseline' }}
                  >
                    <div
                      className="text-[10.5px] uppercase tracking-[0.14em] truncate"
                      style={{ color: '#71717A' }}
                      title={key}
                    >
                      {key}
                    </div>
                    <div
                      className="text-[12.5px] leading-snug break-words"
                      style={{ color: '#E4E4E7' }}
                    >
                      {isUrl ? (
                        <a
                          href={str}
                          target="_blank"
                          rel="noopener noreferrer"
                          className="underline underline-offset-2"
                          style={{ color: accent }}
                        >
                          {str}
                        </a>
                      ) : (
                        <span style={{ whiteSpace: 'pre-wrap' }}>{str}</span>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>

        {/* Footer */}
        <div
          className="flex items-center justify-between gap-3 px-5 py-3 text-[11px]"
          style={{ borderTop: '1px solid var(--border-soft)', color: '#71717A' }}
        >
          <span>{entries.length} {entries.length === 1 ? 'field' : 'fields'}</span>
          <span>Press Esc to close</span>
        </div>
      </div>
    </div>
  );
}

/* ---------- Sub-component: Google Sign-In gate ----------
 * Loads the Google Identity Services SDK dynamically, renders the official
 * "Sign in with Google" button, and checks the ID token's `hd` claim against
 * ALLOWED_GOOGLE_DOMAIN. Only @classlink.com accounts can proceed.
 *
 * Note: This is a client-side gate. Anyone with devtools can edit state to
 * bypass it. For real security, protect the backing data server-side.
 */
function SignInGate({ onSignIn }) {
  const buttonRef = useRef(null);
  const [gsiReady, setGsiReady] = useState(!!window.google?.accounts?.id);
  const [error, setError] = useState(null);
  const [loadError, setLoadError] = useState(false);

  // Load the Google Identity Services script once. Resilient to:
  //  - the script already present on the page (from a previous mount)
  //  - the SDK already loaded on window.google
  //  - polling for window.google if the onload callback was missed
  useEffect(() => {
    // Already loaded?
    if (window.google?.accounts?.id) {
      setGsiReady(true);
      return;
    }

    const scriptId = 'google-identity-services';
    const existing = document.getElementById(scriptId);

    // Poll for window.google becoming available — handles the case where
    // onload already fired before this effect attached, or a prior mount's
    // script is still resolving.
    let cancelled = false;
    const startPoll = () => {
      const start = Date.now();
      const tick = () => {
        if (cancelled) return;
        if (window.google?.accounts?.id) {
          setGsiReady(true);
          return;
        }
        if (Date.now() - start > 8000) {
          // Gave up — but be explicit in the error so we know it's a timeout,
          // not necessarily a network failure.
          setLoadError(true);
          return;
        }
        setTimeout(tick, 100);
      };
      tick();
    };

    if (existing) {
      // A previous render already added the script; just wait for it.
      startPoll();
      return () => { cancelled = true; };
    }

    const script = document.createElement('script');
    script.id = scriptId;
    script.src = 'https://accounts.google.com/gsi/client';
    script.async = true;
    script.defer = true;
    script.onload = () => {
      if (!cancelled) setGsiReady(true);
    };
    script.onerror = () => {
      if (!cancelled) setLoadError(true);
    };
    document.head.appendChild(script);
    // Also poll as a fallback (onload sometimes doesn't fire in sandboxed iframes)
    startPoll();

    return () => { cancelled = true; };
  }, []);

  // Initialize GIS and render the button once the SDK is loaded
  useEffect(() => {
    if (!gsiReady || !buttonRef.current) return;
    if (!window.google?.accounts?.id) return;

    // Guard against a missing / placeholder client ID
    if (!GOOGLE_CLIENT_ID || GOOGLE_CLIENT_ID.startsWith('YOUR_')) {
      setError('No Google OAuth client ID configured. Set GOOGLE_CLIENT_ID at the top of the source file.');
      return;
    }

    const handleCredential = (response) => {
      if (!response?.credential) {
        setError('Sign-in failed — no credential returned.');
        return;
      }
      const payload = decodeJwtPayload(response.credential);
      if (!payload) {
        setError('Sign-in failed — could not read the ID token.');
        return;
      }
      // Domain check. `hd` is set by Google for Workspace accounts only.
      if (payload.hd !== ALLOWED_GOOGLE_DOMAIN) {
        const shown = payload.email || 'your account';
        setError(
          `Only @${ALLOWED_GOOGLE_DOMAIN} accounts can sign in. ${shown} is not part of that Google Workspace.`
        );
        // Also clear any stored auto-select
        try { window.google.accounts.id.disableAutoSelect(); } catch {}
        return;
      }
      // Accepted. Stash basic profile info.
      onSignIn({
        email: payload.email,
        name: payload.name,
        picture: payload.picture,
        sub: payload.sub,
        hd: payload.hd,
        signedInAt: Date.now()
      });
    };

    try {
      window.google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: handleCredential,
        // `hd` on init hints the account picker to only show Workspace accounts
        // from this domain. Still verified on the response above.
        hd: ALLOWED_GOOGLE_DOMAIN,
        ux_mode: 'popup',
        auto_select: false
      });
      window.google.accounts.id.renderButton(buttonRef.current, {
        theme: 'filled_black',
        size: 'large',
        shape: 'pill',
        text: 'signin_with',
        logo_alignment: 'left',
        width: 280
      });
    } catch (err) {
      setError(`Google Sign-In initialization failed: ${err.message || err}`);
    }
  }, [gsiReady, onSignIn]);
