      }
    }
    window.addEventListener('error', function(e) {
      showTallyError('A JavaScript error occurred while starting the app.',

const SAMPLE_TEAM = [

/* ---------------- Helpers ---------------- */

function autoDetectNameColumn(columns, hints) {
  if (!columns || columns.length === 0) return null;
  const lower = columns.map(c => (c || '').toLowerCase().trim());
  for (const hint of hints) {
    const idx = lower.findIndex(c => c === hint);
    if (idx >= 0) return columns[idx];
  }
  for (const hint of hints) {
    const idx = lower.findIndex(c => c.includes(hint));
    if (idx >= 0) return columns[idx];
  }
  const nameIdx = lower.findIndex(c => c.includes('name'));
  if (nameIdx >= 0) return columns[nameIdx];
  return columns[0];
}

// Return list of columns that best match each hint (in order, dedup)
function findPreviewColumns(columns, hints, excludeColumn, secondaryExclude) {
  if (!columns || columns.length === 0) return [];
  const lower = columns.map(c => (c || '').toLowerCase().trim());
  const excluded = new Set([excludeColumn, secondaryExclude].filter(Boolean));
  const picked = [];
  for (const hint of hints) {
    let idx = lower.findIndex((c, i) => c === hint && !excluded.has(columns[i]) && !picked.includes(columns[i]));
    if (idx < 0) {
      idx = lower.findIndex((c, i) => c.includes(hint) && !excluded.has(columns[i]) && !picked.includes(columns[i]));
    }
    if (idx >= 0) picked.push(columns[idx]);
  }
  return picked;
}

// Detect if the file is a pre-aggregated summary by looking for a column like
// "Handled", "Total Calls", "Count", etc. — one row represents many actions.
// Returns the column name if found, otherwise null (per-row counting).
function autoDetectCountColumn(columns, hints, rows, excludeColumn) {
  if (!columns || columns.length === 0 || !hints || hints.length === 0) return null;
  const lower = columns.map(c => (c || '').toLowerCase().trim());

  const isNumericColumn = (col) => {
    if (!rows || rows.length === 0) return false;
    let numericCount = 0;
    let sampleSize = 0;
    for (let i = 0; i < Math.min(rows.length, 20); i++) {
      const v = rows[i][col];
      if (v === undefined || v === null || v === '') continue;
      sampleSize++;
      const n = typeof v === 'number' ? v : parseFloat(String(v).replace(/,/g, ''));
      if (!isNaN(n) && n >= 0) numericCount++;
    }
    return sampleSize > 0 && numericCount / sampleSize >= 0.8;
  };

  // Try exact match first, then substring; require the column to be numeric
  for (const hint of hints) {
    for (let i = 0; i < columns.length; i++) {
      if (columns[i] === excludeColumn) continue;
      if (lower[i] === hint && isNumericColumn(columns[i])) return columns[i];
    }
  }
  for (const hint of hints) {
    for (let i = 0; i < columns.length; i++) {
      if (columns[i] === excludeColumn) continue;
      if (lower[i].includes(hint) && isNumericColumn(columns[i])) return columns[i];
    }
  }
  return null;
}

/* ---------------- Date parsing + week bucketing ---------------- */

// Parse a variety of date formats seen in Salesforce/Zoom/Calendly exports.
// Returns a Date or null. Handles:
//   "4/12/2026, 10:03 AM"       (Salesforce — US slash, comma, am/pm)
//   "4/17/2026 17:57"           (Zoom — US slash, 24hr)
//   "2026-04-14 02:00 pm"       (Calendly — ISO date, am/pm)
//   "2026-04-14T02:00:00Z"      (ISO-8601)
//   native Date objects from XLSX parsing
function parseDateFlexible(raw) {
  if (raw === null || raw === undefined || raw === '') return null;
  if (raw instanceof Date) return isNaN(raw) ? null : raw;
  const s = String(raw).trim();
  if (!s) return null;

  // Strip commas that separate date from time in some exports
  const cleaned = s.replace(/,/g, ' ').replace(/\s+/g, ' ').trim();

  // Try native parser first — works for ISO-8601 and many US formats
  const native = new Date(cleaned);
  if (!isNaN(native)) {
    // Guard against bogus results (Date.parse can return odd things for "1h 23m")
    // Require the year to be between 2000–2100
    const y = native.getFullYear();
    if (y >= 2000 && y <= 2100) return native;
  }

  // Explicit US slash format: M/D/YYYY [HH:MM[ am/pm]]
  const usMatch = cleaned.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})(?:\s+(\d{1,2}):(\d{2})(?::(\d{2}))?(?:\s*(am|pm|AM|PM))?)?$/);
  if (usMatch) {
    const [, m, d, y, h, mi, sec, ap] = usMatch;
    let hour = h ? parseInt(h, 10) : 0;
    const minute = mi ? parseInt(mi, 10) : 0;
    const second = sec ? parseInt(sec, 10) : 0;
    if (ap && ap.toLowerCase() === 'pm' && hour < 12) hour += 12;
    if (ap && ap.toLowerCase() === 'am' && hour === 12) hour = 0;
    return new Date(parseInt(y, 10), parseInt(m, 10) - 1, parseInt(d, 10), hour, minute, second);
  }

  return null;
}

// Return the Monday of the ISO week containing `date` (midnight, local time).
function weekStart(date) {
  const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  const dow = d.getDay(); // 0=Sun, 1=Mon, ...
  const offsetToMonday = (dow + 6) % 7; // Sun→6, Mon→0, Tue→1, ...
  d.setDate(d.getDate() - offsetToMonday);
  return d;
}

// Key for a week: "YYYY-MM-DD" of the Monday
function weekKey(date) {
  const ws = weekStart(date);
  const y = ws.getFullYear();
  const m = String(ws.getMonth() + 1).padStart(2, '0');
  const d = String(ws.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

// Short display label, e.g. "Apr 14" for the Monday of that week
function weekLabel(wKey) {
  const [y, m, d] = wKey.split('-').map(Number);
  const date = new Date(y, m - 1, d);
  return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

/* ---------------- Zoom meeting duration ----------------
 * Zoom's export gives a full timestamp for Start but only a time-of-day for End
 * (e.g. "3:59:40 PM"), assumed to share the Start's date. If End falls before
 * Start in clock terms, the meeting crossed midnight, so we bump one day.
 *
 * Returns duration in minutes, or null if it can't be computed.
 */
const MIN_ZOOM_DURATION_MINUTES = 5;

function zoomMeetingDurationMinutes(startRaw, endRaw) {
  if (!startRaw || !endRaw) return null;
  const start = parseDateFlexible(startRaw);
  if (!start) return null;

  // Try full-date end first (in case Zoom ever exports with date included)
  const endFull = parseDateFlexible(endRaw);
  let end;
  if (endFull && !isNaN(endFull) && endFull.getFullYear() >= 2000) {
    end = endFull;
  } else {
    // Fall back to time-only end — assume same date as start, bump a day if needed
    const s = String(endRaw).trim();
    const m = s.match(/^(\d{1,2}):(\d{2})(?::(\d{2}))?\s*(am|pm|AM|PM)?$/);
    if (!m) return null;
    let hour = parseInt(m[1], 10);
    const minute = parseInt(m[2], 10);
    const second = m[3] ? parseInt(m[3], 10) : 0;
    const ap = m[4] ? m[4].toLowerCase() : null;
    if (ap === 'pm' && hour < 12) hour += 12;
    if (ap === 'am' && hour === 12) hour = 0;
    end = new Date(start);
    end.setHours(hour, minute, second, 0);
    if (end < start) end.setDate(end.getDate() + 1);
  }

  const ms = end.getTime() - start.getTime();
  if (ms < 0 || ms > 24 * 60 * 60 * 1000) return null; // sanity check
  return ms / 60000;
}

// True if the row is a Zoom meeting shorter than the minimum duration — these
// are filtered out of counts (failed connects, accidental starts, etc.)
function isZoomMeetingTooShort(row) {
  // Find Start/End columns by case-insensitive match to tolerate header variants
  const keys = Object.keys(row);
  const startKey = keys.find(k => /^start\s*time$/i.test(k)) || keys.find(k => /start/i.test(k));
  const endKey   = keys.find(k => /^end\s*time$/i.test(k))   || keys.find(k => /^end/i.test(k));
  if (!startKey || !endKey) return false; // can't evaluate → don't filter
  const mins = zoomMeetingDurationMinutes(row[startKey], row[endKey]);
  if (mins === null) return false; // unparseable → don't filter
  return mins < MIN_ZOOM_DURATION_MINUTES;
}

function autoDetectDateColumn(columns, hints) {
  if (!columns || columns.length === 0 || !hints) return null;
  const lower = columns.map(c => (c || '').toLowerCase().trim());
  for (const hint of hints) {
    for (let i = 0; i < columns.length; i++) {
      if (lower[i] === hint) return columns[i];
    }
  }
  for (const hint of hints) {
    for (let i = 0; i < columns.length; i++) {
      if (lower[i].includes(hint)) return columns[i];
    }
  }
  return null;
}

/* ---------------- Field-mapping instruction sheet ----------------
 * Builds a human-readable text document describing how each uploaded source
 * is currently mapped — which column holds the name, which holds the count,
 * which holds the date — plus the points-per-action rule in effect.
 * Useful for documenting the setup, training a teammate, or validating that
 * next month's upload is being interpreted the same way.
 */
function buildMappingInstructions(sources, sourceConfig, points) {
  const lines = [];
  lines.push('TALLY — FIELD MAPPING INSTRUCTIONS');
  lines.push('');
  lines.push('Confirm these dropdown selections each time you upload a');
  lines.push('new report. If a column name changes, adjust the mapping to');
  lines.push('match — otherwise scores may shift unexpectedly.');
  lines.push('');
  lines.push('─'.repeat(60));

  for (const cfg of Object.values(sourceConfig)) {
    const src = sources[cfg.key];
    lines.push('');
    lines.push(`${cfg.label.toUpperCase()}  —  ${cfg.sublabel}`);
    lines.push(`Points per ${cfg.actionLabel}: ${points[cfg.pointsKey] ?? 0}`);
    if (!src || !src.selectedColumn) {
      lines.push('  (No file uploaded yet — mappings will appear here once you import one.)');
      continue;
    }
    lines.push(`  Name column:   "${src.selectedColumn}"`);
    lines.push(`  Count column:  ${src.countColumn ? `Sum of "${src.countColumn}"` : '1 per row (log file)'}`);
    lines.push(`  Date column:   ${src.dateColumn ? `"${src.dateColumn}"` : '(none — excluded from Weekly Trends)'}`);
  }

  lines.push('');
  lines.push('─'.repeat(60));
  lines.push('');
  lines.push('WHEN UPLOADING NEXT MONTH:');
  lines.push(' 1. Use the same export format and column layout.');
  lines.push(' 2. If columns are renamed, re-verify the three mappings above');
  lines.push('    (Name, Count, Date) in each upload card.');
  lines.push(' 3. If your Calendly Question/Response pairs change position,');
  lines.push('    the case-number and district duplicate-detection still works');
  lines.push('    — we scan all five Question slots regardless of order.');
  lines.push(' 4. Zoom Phone "Time Range" summary files that lack per-row');
  lines.push('    dates will be placed on the timeline using the preamble');
  lines.push('    date only — for best timeline accuracy, upload daily files.');

  return lines.join('\n');
}

/* ---------------- Calendly ↔ Zoom deduplication ----------------
 * Many Calendly bookings create a Zoom meeting automatically, so the same
 * meeting appears in both exports. To avoid double-counting, we detect these
 * pairs and skip the Zoom row — Calendly is the source of truth because it
 * already gets a booking point.
 *
 * Match criteria (ALL must hold):
 *   1) Same Salesforce case number (5+ digits) in Calendly Response columns
 *      and Zoom topic
 *   2) Same host (by canonical nameKey)
 *   3) Start times within 30 minutes (accounts for hosts starting a
 *      few minutes late; observed max in real data = 5 min)
 */

// Extract the first run of 5+ digits from a string. Salesforce case numbers
// in practice are 7-8 digits; we accept 5+ to be safe.
function extractCaseNumber(text) {
  if (!text) return null;
  const m = String(text).match(/\d{5,}/);
  return m ? m[0] : null;
}

// Scan Calendly Question/Response pairs for one tagged as a case number.
function calendlyCaseNumber(row) {
  for (let i = 1; i <= 5; i++) {
    const q = (row[`Question ${i}`] || '').toLowerCase();
    if (q.includes('case')) {
      const caseNum = extractCaseNumber(row[`Response ${i}`]);
      if (caseNum) return caseNum;
    }
  }
  return null;
}

// Scan Calendly Q1-5 for a district/school/institution field and return its
// response value. Ignores tenant-ID and case-number questions, and skips
// purely numeric responses (those are IDs, not district names).
function calendlyDistrict(row) {
  for (let i = 1; i <= 5; i++) {
    const q = (row[`Question ${i}`] || '').toLowerCase();
    const r = String(row[`Response ${i}`] || '').trim();
    if (!r) continue;
    // Skip numeric-only responses (tenant IDs)
    if (/^\d+$/.test(r)) continue;
    const mentionsDistrict = /(district|school|institution|\borg\b)/.test(q);
    const isExcluded = /(tenant|case|number|id\b)/.test(q);
    if (mentionsDistrict && !isExcluded) return r;
  }
  return null;
}

// Normalize a district/topic string to tokens for fuzzy matching.
// Strips punctuation, lowercases, removes very short/common words.
const DISTRICT_STOPWORDS = new Set([
  'the', 'and', 'for', 'with', 'not', 'provided', 'none'
]);
function districtTokens(s) {
  if (!s) return new Set();
  const cleaned = String(s)
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')     // strip accents
    .toLowerCase()
    .replace(/[^a-z0-9\s]/g, ' ')                         // punctuation → space
    .replace(/\s+/g, ' ')
    .trim();
  const tokens = new Set();
  for (const t of cleaned.split(' ')) {
    if (t.length >= 3 && !DISTRICT_STOPWORDS.has(t)) tokens.add(t);
  }
  return tokens;
}

function districtNorm(s) {
  if (!s) return '';
  return String(s)
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .toLowerCase()
    .replace(/[^a-z0-9\s]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

// Does Zoom `topic` describe the same district as Calendly `district`?
//  - Exact substring match (either direction), OR
//  - 2+ significant tokens in common, OR
//  - 1 token in common when the district is a single significant token
function districtMatches(district, topic) {
  const dNorm = districtNorm(district);
  const tNorm = districtNorm(topic);
  if (!dNorm || !tNorm) return false;
  if (dNorm === tNorm) return true;
  if (tNorm.includes(dNorm) || dNorm.includes(tNorm)) return true;

  const dTok = districtTokens(district);
  const tTok = districtTokens(topic);
  if (dTok.size === 0 || tTok.size === 0) return false;
  let overlap = 0;
  for (const t of dTok) if (tTok.has(t)) overlap++;
  if (overlap >= 2) return true;
  if (overlap >= 1 && dTok.size === 1) return true;
  return false;
}

// Returns an object: { indices: Set, details: [{ zoomIndex, reason, matchedCase?, matchedDistrict?, calendlyIndex, deltaMs }] }
// The set powers fast skip checks during counting; the details array powers
// the Duplicates page, where each row is explained to the user.
function findZoomDuplicates(calendlyRows, zoomRows, calendlyDateCol, zoomDateCol, calendlyNameCol, zoomNameCol) {
  const result = { indices: new Set(), details: [] };
  if (!calendlyRows?.length || !zoomRows?.length) return result;
  if (!calendlyDateCol || !zoomDateCol) return result;
  if (!calendlyNameCol || !zoomNameCol) return result;

  const THIRTY_MIN = 30 * 60 * 1000;

  // Build two parallel indices of Calendly bookings:
  //   byCase — { caseNum -> [{ time, nameKey, calendlyIndex }, ...] }
  //   byHost — { nameKey -> [{ time, district, calendlyIndex }, ...] }
  const byCase = new Map();
  const byHost = new Map();
  calendlyRows.forEach((row, calIdx) => {
    const date = parseDateFlexible(row[calendlyDateCol]);
    if (!date) return;
    const name = String(row[calendlyNameCol] || '').trim();
    if (!name) return;
    const rawKey = nameKey(name);
    if (!rawKey) return;
    const canonKey = CANONICAL_KEY[rawKey] || rawKey;
    const time = date.getTime();

    const caseNum = calendlyCaseNumber(row);
    if (caseNum) {
      if (!byCase.has(caseNum)) byCase.set(caseNum, []);
      byCase.get(caseNum).push({ time, nameKey: canonKey, calendlyIndex: calIdx });
    }
    const district = calendlyDistrict(row);
    if (district) {
      if (!byHost.has(canonKey)) byHost.set(canonKey, []);
      byHost.get(canonKey).push({ time, district, calendlyIndex: calIdx });
    }
  });
  if (byCase.size === 0 && byHost.size === 0) return result;

  zoomRows.forEach((row, idx) => {
    const topicKey = Object.keys(row).find(k => String(k).toLowerCase() === 'topic');
    const topic = topicKey ? (row[topicKey] || '') : '';
    const zoomDate = parseDateFlexible(row[zoomDateCol]);
    if (!zoomDate) return;
    const name = String(row[zoomNameCol] || '').trim();
    if (!name) return;
    const rawKey = nameKey(name);
    if (!rawKey) return;
    const canonKey = CANONICAL_KEY[rawKey] || rawKey;
    const zoomTime = zoomDate.getTime();

    // Path 1: case number match (preferred — unambiguous)
    const caseNum = extractCaseNumber(topic);
    if (caseNum) {
      const candidates = byCase.get(caseNum);
      if (candidates) {
        for (const cal of candidates) {
          if (cal.nameKey !== canonKey) continue;
          const delta = Math.abs(cal.time - zoomTime);
          if (delta <= THIRTY_MIN) {
            result.indices.add(idx);
            result.details.push({
              zoomIndex: idx,
              calendlyIndex: cal.calendlyIndex,
              reason: 'case',
              matchedCase: caseNum,
              deltaMs: delta
            });
            return;
          }
        }
      }
    }

    // Path 2: district match
    const hostCandidates = byHost.get(canonKey);
    if (hostCandidates) {
      for (const cal of hostCandidates) {
        const delta = Math.abs(cal.time - zoomTime);
        if (delta > THIRTY_MIN) continue;
        if (districtMatches(cal.district, topic)) {
          result.indices.add(idx);
          result.details.push({
            zoomIndex: idx,
            calendlyIndex: cal.calendlyIndex,
            reason: 'district',
            matchedDistrict: cal.district,
            deltaMs: delta
          });
          return;
        }
      }
    }
  });

  return result;
}

/* ---------------- Salesforce dedupe ----------------
 * When a Salesforce case number appears in either a Calendly booking
 * (Question/Response) or a non-duplicate Zoom meeting topic, the case has
 * already been "counted" by the meeting — so we skip the Salesforce row
 * to avoid giving the same work two points.
 *
 * Priority: Calendly > Zoom > Salesforce. If a case is in Calendly, that
 * wins regardless of whether Zoom also has it (the Zoom row would have
 * already been flagged as a Calendly-duplicate by findZoomDuplicates).
 *
 * Returns { indices, details }:
 *   indices: Set of Salesforce row indices to skip during counting
 *   details: [{ salesforceIndex, matchedIn: 'calendly' | 'zoom', matchedCase, calendlyIndex?, zoomIndex? }]
 */
/* ---------------- Salesforce bonus classification ----------------
 * AD Connector tickets earn bonus points because they're higher-impact
 * infrastructure work. A ticket qualifies when ANY of these match:
 *   1) Category contains "AD Connector" (or "Active Directory Connector")
 *   2) Category Details contains "AD Connector", OR literally equals
 *      "AD (TMS)" (which is the Salesforce code for AD Connector tickets)
 *   3) Description references "AD Connector" / "Active Directory Connector"
 *
 * Returns { reason, label, evidence } or null.
 */
const SALESFORCE_BONUS_POINTS = 3;

const AD_CONNECTOR_PATTERN = /\bad[-\s]?connector\b|\bactive\s+directory\s+connector\b/i;

function classifySalesforceBonus(row) {
  if (!row) return null;
  const category = String(row['Category'] || '');
  const categoryDetails = String(row['Category Details'] || '');
  const description = String(row['Description'] || '');

  if (AD_CONNECTOR_PATTERN.test(category)) {
    return {
      reason: 'ad_connector',
      label: 'AD Connector issue',
      evidence: `Category = "${category}"`
    };
  }
  if (AD_CONNECTOR_PATTERN.test(categoryDetails)) {
    return {
      reason: 'ad_connector',
      label: 'AD Connector issue',
      evidence: `Category Details = "${categoryDetails}"`
    };
  }
  // Salesforce's canonical code for AD Connector tickets
  if (categoryDetails.trim().toLowerCase() === 'ad (tms)') {
    return {
      reason: 'ad_connector',
      label: 'AD Connector issue',
      evidence: `Category Details = "${categoryDetails}" (AD/TMS = AD Connector)`
    };
  }
  if (AD_CONNECTOR_PATTERN.test(description)) {
    // Grab a short context snippet around the match for the evidence
    const m = description.match(AD_CONNECTOR_PATTERN);
    const idx = m ? description.search(AD_CONNECTOR_PATTERN) : -1;
    let snippet = '';
    if (idx >= 0) {
      const start = Math.max(0, idx - 20);
      const end = Math.min(description.length, idx + 60);
      snippet = (start > 0 ? '…' : '') + description.slice(start, end).replace(/\s+/g, ' ').trim() + (end < description.length ? '…' : '');
    }
    return {
      reason: 'ad_connector',
      label: 'AD Connector issue',
      evidence: `Description mentions "AD Connector"${snippet ? `: ${snippet}` : ''}`
    };
  }
  return null;
}

function findSalesforceDuplicates(salesforceRows, salesforceColumns, calendlyRows, zoomRows, zoomSkipIndices) {
  const result = { indices: new Set(), details: [] };
  if (!salesforceRows?.length || !salesforceColumns?.length) return result;

  // Auto-detect the case-number column (header like "Case Number", "Case #", etc.)
  const lower = salesforceColumns.map(c => String(c || '').toLowerCase().trim());
  let caseCol = null;
  for (let i = 0; i < lower.length; i++) {
    if (lower[i] === 'case number' || lower[i] === 'case #' || lower[i] === 'case id') {
      caseCol = salesforceColumns[i];
      break;
    }
  }
  if (!caseCol) {
    for (let i = 0; i < lower.length; i++) {
      if (lower[i].includes('case') && (lower[i].includes('number') || lower[i].includes('#') || lower[i].includes(' id'))) {
        caseCol = salesforceColumns[i];
        break;
      }
    }
  }
  if (!caseCol) return result;

  // Case number -> Calendly row index (first match wins)
  const calByCase = new Map();
  (calendlyRows || []).forEach((row, i) => {
    const c = calendlyCaseNumber(row);
    if (c && !calByCase.has(c)) calByCase.set(c, i);
  });

  // Case number -> Zoom row index, but ONLY for Zoom rows not already skipped
  // (if a Zoom row is a Calendly-duplicate, the case is represented by Calendly)
  const zoomByCase = new Map();
  (zoomRows || []).forEach((row, i) => {
    if (zoomSkipIndices && zoomSkipIndices.has(i)) return;
    const topicKey = Object.keys(row).find(k => String(k).toLowerCase() === 'topic');
    if (!topicKey) return;
    const c = extractCaseNumber(row[topicKey]);
    if (c && !zoomByCase.has(c)) zoomByCase.set(c, i);
  });

  salesforceRows.forEach((row, idx) => {
    const caseNum = extractCaseNumber(row[caseCol]);
    if (!caseNum) return;

    // Calendly wins
    if (calByCase.has(caseNum)) {
      result.indices.add(idx);
      result.details.push({
        salesforceIndex: idx,
        matchedIn: 'calendly',
        matchedCase: caseNum,
        calendlyIndex: calByCase.get(caseNum)
      });
      return;
    }
    // Otherwise Zoom (non-duplicate)
    if (zoomByCase.has(caseNum)) {
      result.indices.add(idx);
      result.details.push({
        salesforceIndex: idx,
        matchedIn: 'zoom',
        matchedCase: caseNum,
        zoomIndex: zoomByCase.get(caseNum)
      });
    }
  });

  return result;
}

/* ---------------- Name normalization ----------------
 * Handles Salesforce-style variants like "Frany Berroa-Roa" matching "Frany Berroa"
 * by reducing names to a canonical key of first-token + last-token-prefix.
 */
function normalizeName(name) {
  return String(name || '')
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '') // strip accents
    .toLowerCase()
    .replace(/[^a-z\s-]/g, ' ')  // keep letters, spaces, hyphens
    .replace(/\s+/g, ' ')
    .trim();
}

function nameKey(name) {
  const norm = normalizeName(name);
  const tokens = norm.split(/\s+/).filter(Boolean);
  if (tokens.length === 0) return '';
  if (tokens.length === 1) return tokens[0];
  const first = tokens[0];
  const last = tokens[tokens.length - 1];
  // First 5 chars of last token → tolerates hyphens, suffixes, and typos at the end
  const lastPrefix = last.length > 5 ? last.slice(0, 5) : last;
  return first + '|' + lastPrefix;
}

/* ---------------- Team roster (whitelist) ----------------
 * Only people whose name normalizes to a key in this set will be counted,
 * leaderboarded, charted, or shown anywhere in the UI. Everyone else —
 * including managers, external contacts, and unrelated agents that show up
 * in exports — is silently filtered out.
 *
 * The canonical display name (with correct capitalization) is preserved for
 * the leaderboard; variant spellings in the uploads (e.g. "Frany Berroa-Roa"
 * vs "Frany Berroa") are merged via nameKey.
 */
const TEAM_ROSTER = [
  'Lindsey Velez',
  'Paul Ritter',
  'Seco Feratovic',
  'Christian Amato',
  'Admir Kolenovic',
  'Andrew Falconi',
  'Michael Serafino',
  'Agan Mrkulic',

  'Louis Rozencwajg-Hays',
  'Meehir Budla',
  'Frany Berroa-Roa',
  'Margarita Lalabekova',

  'Koumba Keita',

];

// Alternate spellings that should resolve to the canonical roster name above.
// Used when an export uses a slightly different spelling. Keyed by canonical
// roster name. Empty for now — add entries here if a future export uses a
// different spelling for someone already on the roster.
const ROSTER_ALIASES = {};

// Set of nameKeys for fast whitelist lookup (includes alias keys)
const ROSTER_KEYS = (() => {
  const s = new Set(TEAM_ROSTER.map(n => nameKey(n)));
  for (const aliases of Object.values(ROSTER_ALIASES)) {
    for (const a of aliases) s.add(nameKey(a));
  }
  return s;
})();

// Preferred display name per key (capitalization from the roster wins over
// whatever appeared in the uploaded file). Aliases route to the canonical name.
const ROSTER_DISPLAY = (() => {
  const m = {};
  for (const n of TEAM_ROSTER) m[nameKey(n)] = n;
  for (const [canonical, aliases] of Object.entries(ROSTER_ALIASES)) {
    for (const a of aliases) m[nameKey(a)] = canonical;
  }
  return m;
})();

// Aliases have their OWN nameKey, so multiple people-keys may point at the
// same canonical roster name. We need a second map from person-key to the
// "canonical key" to merge them correctly in the people list.
const CANONICAL_KEY = (() => {
  const m = {};
  for (const n of TEAM_ROSTER) m[nameKey(n)] = nameKey(n);
  for (const [canonical, aliases] of Object.entries(ROSTER_ALIASES)) {
    const canonKey = nameKey(canonical);
    for (const a of aliases) m[nameKey(a)] = canonKey;
  }
  return m;
})();

/* ---------------- File parsing ---------------- */

// Heuristic: score a 2D row's "likelihood of being the header row"
function scoreAsHeaderRow(cells, hints) {
  const trimmed = cells.map(c => String(c ?? '').trim());
  const nonEmpty = trimmed.filter(c => c !== '').length;
  if (nonEmpty < 2) return -1;
  // Penalize rows with long prose (likely titles / disclaimers)
  const hasProse = trimmed.some(c => c.length > 80);
  if (hasProse) return -100;
  const lowerCells = trimmed.map(c => c.toLowerCase());
  let hintMatches = 0;
  for (const hint of hints) {
    if (lowerCells.some(c => c === hint || c.includes(hint))) hintMatches++;
  }
  // Weight hint matches heavily, then reward density
  return hintMatches * 20 + nonEmpty;
}

function findHeaderRow(rawRows, hints) {
  const maxScan = Math.min(rawRows.length, 30);
  let bestIdx = 0;
  let bestScore = -Infinity;
  for (let i = 0; i < maxScan; i++) {
    const score = scoreAsHeaderRow(rawRows[i] || [], hints);
    if (score > bestScore) {
      bestScore = score;
      bestIdx = i;
    }
  }
  return bestIdx;
}

// Convert 2D array of rows into { columns, rows } by finding headers
// and trimming leading/trailing empty columns and summary footer rows.
// Scan preamble rows (everything before the detected header) for a "Time
// Range" pattern and return the first date found. Zoom Phone summary exports
// include a line like "Time Range: 04/13/2026 12:00 AM to 04/19/2026 11:59 PM".
// When the source has no per-row date column, we fall back to this date so
// summary reports can still be placed on the Weekly Trends timeline.
function extractPreambleDate(rawRows, headerIdx) {
  const patterns = [
    /time\s*range[:\s]+([^\s,]+)/i,        // "Time Range: 04/13/2026 ..."
    /report\s*date[:\s]+([^\s,]+)/i,       // "Report Date: 4/20/2026"
    /as\s*of[:\s]+(\d[^\s,]*)/i,           // "As of 2026-04-20 ..."
    /week\s*of[:\s]+([^\s,]+)/i            // "Week of 4/13/2026"
  ];
  for (let r = 0; r < headerIdx; r++) {
    const row = rawRows[r] || [];
    for (const cell of row) {
      if (!cell) continue;
      const text = String(cell);
      for (const pat of patterns) {
        const m = text.match(pat);
        if (m && m[1]) {
          const d = parseDateFlexible(m[1]);
          if (d) return d;
        }
      }
    }
  }
  return null;
}

function rowsToObjects(rawRows, hints) {
  if (!rawRows || rawRows.length === 0) return { columns: [], rows: [], fallbackDate: null };

  const headerIdx = findHeaderRow(rawRows, hints);
  const headerRow = rawRows[headerIdx] || [];
  const fallbackDate = extractPreambleDate(rawRows, headerIdx);

  // Determine the column range used (skip leading/trailing empty columns)
  let firstCol = 0;
  while (firstCol < headerRow.length && !String(headerRow[firstCol] ?? '').trim()) firstCol++;
  let lastCol = headerRow.length - 1;
  while (lastCol >= firstCol && !String(headerRow[lastCol] ?? '').trim()) lastCol--;

  const columns = [];
  const sourceColumnIndices = []; // which raw column each output column came from
  for (let i = firstCol; i <= lastCol; i++) {
    const name = String(headerRow[i] ?? '').replace(/^\uFEFF/, '').trim();
    if (name) {
      columns.push(name);
      sourceColumnIndices.push(i);
    }
  }

  const rows = [];
  for (let r = headerIdx + 1; r < rawRows.length; r++) {
    const raw = rawRows[r] || [];
    const obj = {};
    let nonEmpty = 0;
    let firstVal = '';
    for (let c = 0; c < columns.length; c++) {
      const idx = sourceColumnIndices[c];
      const val = raw[idx];
      if (val !== null && val !== undefined && val !== '') {
        obj[columns[c]] = val;
        nonEmpty++;
        if (c === 0) firstVal = String(val).trim().toLowerCase();
      } else {
        obj[columns[c]] = '';
      }
    }
    if (nonEmpty === 0) continue;
    // Skip obvious summary/footer rows
    if (['total', 'totals', 'grand total', 'grand totals', 'subtotal'].includes(firstVal)) continue;
    // Skip long copyright / disclaimer rows (usually 1 populated cell with a sentence)
    if (nonEmpty === 1) {
      const onlyVal = Object.values(obj).find(v => v !== '');
      if (onlyVal && String(onlyVal).length > 80) continue;
    }
    rows.push(obj);
  }

  return { columns, rows, fallbackDate: fallbackDate ? fallbackDate.toISOString() : null };
}

function parseFile(file, hints = []) {
  return new Promise((resolve, reject) => {
    const ext = file.name.toLowerCase().split('.').pop();

    if (ext === 'csv' || ext === 'tsv' || ext === 'txt') {
      Papa.parse(file, {
        header: false, // parse as 2D array so we can find the real header row
        skipEmptyLines: true,
        complete: (results) => {
          try {
            resolve(rowsToObjects(results.data || [], hints));
          } catch (err) {
            reject(err);
          }
        },
        error: reject
      });
      return;
    }

    if (ext === 'xlsx' || ext === 'xls' || ext === 'xlsm') {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = new Uint8Array(e.target.result);
          const workbook = XLSX.read(data, { type: 'array', cellDates: true });
          const firstSheetName = workbook.SheetNames[0];
          const firstSheet = workbook.Sheets[firstSheetName];
          if (!firstSheet) {
            resolve({ columns: [], rows: [], fallbackDate: null });
            return;
          }
          // raw: false uses Excel's number formats → readable dates/numbers
          // header: 1 returns rows as arrays (not objects)
          const rawRows = XLSX.utils.sheet_to_json(firstSheet, {
            header: 1,
            defval: '',
            raw: false,
            blankrows: false
          });
          resolve(rowsToObjects(rawRows, hints));
        } catch (err) {
          reject(err);
        }
      };
      reader.onerror = () => reject(new Error('Failed to read file'));
      reader.readAsArrayBuffer(file);
      return;
    }

    reject(new Error('Unsupported file type. Please upload a CSV or XLSX file.'));
  });
}

function countByColumn(rows, column, countColumn, skipIndices) {
  // Returns: { [nameKey]: { count, names: [originalName, ...] } }
  // When countColumn is provided, each row contributes the numeric value from that
  // column (e.g. a "Handled: 27" summary row counts as 27). When null/undefined,
  // each row contributes 1 (the traditional per-action log).
  // Filtered to TEAM_ROSTER — names not on the roster are silently skipped.
  // Alias keys are canonicalized so variants merge into one person.
  // skipIndices: optional Set of row indices to skip entirely (used for
  //   Calendly↔Zoom deduplication).
  const result = {};
  if (!column) return result;
  for (let i = 0; i < rows.length; i++) {
    if (skipIndices && skipIndices.has(i)) continue;
    const row = rows[i];
    const raw = row[column];
    if (raw === undefined || raw === null) continue;
    const name = String(raw).trim();
    if (!name) continue;
    const rawKey = nameKey(name);
    if (!rawKey) continue;
    if (!ROSTER_KEYS.has(rawKey)) continue; // whitelist
    const key = CANONICAL_KEY[rawKey] || rawKey; // merge aliases

    let increment = 1;
    if (countColumn) {
      const cv = row[countColumn];
      if (cv === undefined || cv === null || cv === '') { increment = 0; }
      else {
        const n = typeof cv === 'number' ? cv : parseFloat(String(cv).replace(/,/g, ''));
        increment = isNaN(n) ? 0 : Math.max(0, Math.round(n));
      }
    }
    if (increment <= 0) continue;

    if (!result[key]) result[key] = { count: 0, names: [] };
    result[key].count += increment;
    if (!result[key].names.includes(name)) result[key].names.push(name);
  }
  return result;
}

/* ---------------- Salesforce counting with bonuses ----------------
 * Mirrors countByColumn but also computes points per person with the bonus
 * rule applied. Bonus-qualifying rows (Category Details = "Login Issue" or
 * "AD (TMS)") are worth SALESFORCE_BONUS_POINTS; all others earn basePoints.
 * A row capped at the bonus value — no stacking.
 *
 * Returns: { [nameKey]: { count, points, bonusCount, names, bonusRows } }
 *   count       — number of tickets counted (after skipIndices filter)
 *   points      — total Salesforce points this person earned
 *   bonusCount  — how many of those tickets got the bonus
 *   bonusRows   — row indices that got the bonus (for the audit page)
 *   names       — observed spellings
 */
function countSalesforceRows(rows, nameCol, skipIndices, basePoints) {
  const result = {};
  if (!nameCol) return { counts: result, bonusRows: [] };
  const bonusRows = [];
  for (let i = 0; i < rows.length; i++) {
    if (skipIndices && skipIndices.has(i)) continue;
    const row = rows[i];
    const raw = row[nameCol];
    if (raw === undefined || raw === null) continue;
    const name = String(raw).trim();
    if (!name) continue;
    const rawKey = nameKey(name);
    if (!rawKey) continue;
    if (!ROSTER_KEYS.has(rawKey)) continue;
    const key = CANONICAL_KEY[rawKey] || rawKey;

    const bonus = classifySalesforceBonus(row);
    const rowPoints = bonus ? SALESFORCE_BONUS_POINTS : basePoints;

    if (!result[key]) result[key] = { count: 0, points: 0, bonusCount: 0, names: [] };
    result[key].count += 1;
    result[key].points += rowPoints;
    if (bonus) {
      result[key].bonusCount += 1;
      bonusRows.push({ rowIndex: i, personKey: key, reason: bonus.reason, label: bonus.label, evidence: bonus.evidence });
    }
    if (!result[key].names.includes(name)) result[key].names.push(name);
  }
  return { counts: result, bonusRows };
}

function getInitials(name) {
  return name
    .split(/\s+/)
    .filter(Boolean)
    .slice(0, 2)
    .map(n => n[0].toUpperCase())
    .join('');
}

// Stable pastel-ish tint per person
function nameToHue(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) % 360;
  return h;
}

// of "Authorized JavaScript origins" in that client configuration.
const GOOGLE_CLIENT_ID = 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com';

// Only allow accounts from this Google Workspace domain. The `hd` claim in the
// ID token is set server-side by Google for Workspace accounts, so this is
// the safe place to check domain membership (personal @gmail.com accounts
// don't have an `hd` claim at all).
const ALLOWED_GOOGLE_DOMAIN = 'classlink.com';

// Decodes the payload of a Google ID token (JWT) without verifying signature.
// This is safe for client-side domain gating because the ID token was obtained
// directly from Google via the GIS library — we only use the `hd` claim to
// decide what to show. Any real security would happen server-side.
function decodeJwtPayload(token) {
  try {
    const parts = token.split('.');
    if (parts.length !== 3) return null;
    // Base64url → base64 → decoded bytes → UTF-8 string
    const base64 = parts[1].replace(/-/g, '+').replace(/_/g, '/').padEnd(Math.ceil(parts[1].length / 4) * 4, '=');
    const json = decodeURIComponent(
      atob(base64)
        .split('')
        .map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2))
        .join('')
    );
    return JSON.parse(json);
  } catch {
    return null;
  }
}

/* ---------------- Persistence ---------------- */

const STORAGE_KEYS = {
  sources: 'tally_v1_sources',
  points:  'tally_v1_points',
  activePage: 'tally_v1_activePage',
  user: 'tally_v1_user'
};

const safeStorage = {
  get(key) {
    try {
      if (typeof window === 'undefined' || !window.localStorage) return null;
      return window.localStorage.getItem(key);
    } catch { return null; }
  },
  set(key, value) {
    try {
      if (typeof window !== 'undefined' && window.localStorage) {
        window.localStorage.setItem(key, value);
      }
    } catch (e) {
      console.warn(`localStorage save failed for ${key}:`, e.message);
    }
  },
  remove(key) {
    try {
      if (typeof window !== 'undefined' && window.localStorage) {
        window.localStorage.removeItem(key);
      }
    } catch {}
  }
};

const DEFAULT_SOURCES = {
  salesforce: { fileName: null, columns: [], rows: [], selectedColumn: null, countColumn: null, dateColumn: null, error: null },
  zoom:       { fileName: null, columns: [], rows: [], selectedColumn: null, countColumn: null, dateColumn: null, error: null },
  zoomPhone:  { fileName: null, columns: [], rows: [], selectedColumn: null, countColumn: null, dateColumn: null, error: null },
  calendly:   { fileName: null, columns: [], rows: [], selectedColumn: null, countColumn: null, dateColumn: null, error: null }
};

const DEFAULT_POINTS = {
  salesforceTicket: 1,
  zoomMeeting: 10,
  zoomPhoneCall: 5,
  calendlyMeeting: 10
};

function loadSourcesFromStorage() {
  const raw = safeStorage.get(STORAGE_KEYS.sources);
  if (!raw) return DEFAULT_SOURCES;
  try {
    const parsed = JSON.parse(raw);
    // Shape validation — fall back to defaults if anything looks off
    if (!parsed || typeof parsed !== 'object') return DEFAULT_SOURCES;
    const result = { ...DEFAULT_SOURCES };
    for (const key of Object.keys(DEFAULT_SOURCES)) {
      const s = parsed[key];
      if (s && typeof s === 'object' && Array.isArray(s.rows) && Array.isArray(s.columns)) {
        result[key] = {
          fileName: s.fileName ?? null,
          columns: s.columns,
          rows: s.rows,
          selectedColumn: s.selectedColumn ?? null,
          countColumn: s.countColumn ?? null,
          dateColumn: s.dateColumn ?? null,
          error: null // never persist errors
        };
      }
    }
    return result;
  } catch {
    return DEFAULT_SOURCES;
  }
}

function loadPointsFromStorage() {
  const raw = safeStorage.get(STORAGE_KEYS.points);
  if (!raw) return DEFAULT_POINTS;
  try {
    const parsed = JSON.parse(raw);
    if (!parsed || typeof parsed !== 'object') return DEFAULT_POINTS;
    const result = { ...DEFAULT_POINTS };
    for (const key of Object.keys(DEFAULT_POINTS)) {
      if (typeof parsed[key] === 'number' && !isNaN(parsed[key])) {
        result[key] = Math.max(0, parsed[key]);
      }
    }
    return result;
  } catch {
    return DEFAULT_POINTS;
  }
}

function GamificationDashboard() {
  const salesforceInputRef = useRef(null);
  const zoomInputRef = useRef(null);
  const zoomPhoneInputRef = useRef(null);
  const calendlyInputRef = useRef(null);
  const fileInputs = {
    salesforce: salesforceInputRef,
    zoom: zoomInputRef,
    zoomPhone: zoomPhoneInputRef,
    calendly: calendlyInputRef
  };

  // For each source: fileName, columns, rows, selectedColumn, error
  const [sources, setSources] = useState(() => loadSourcesFromStorage());

  const [points, setPoints] = useState(() => loadPointsFromStorage());

  // Currently signed-in user — null means the sign-in gate should show.
  // Persisted in localStorage so sign-in sticks across refreshes.
  const [user, setUser] = useState(() => {
    const stored = safeStorage.get(STORAGE_KEYS.user);
    if (!stored) return null;
    try { return JSON.parse(stored); }
    catch { return null; }

  const handleSignIn = useCallback((userInfo) => {
    setUser(userInfo);
    safeStorage.set(STORAGE_KEYS.user, JSON.stringify(userInfo));
  }, []);

  const handleSignOut = useCallback(() => {
    setUser(null);
    safeStorage.remove(STORAGE_KEYS.user);
    // Also revoke the Google session so the picker shows again next time
    if (window.google?.accounts?.id) {
      try { window.google.accounts.id.disableAutoSelect(); } catch {}
    }
  }, []);

  // Persist on change
  useEffect(() => {
    safeStorage.set(STORAGE_KEYS.sources, JSON.stringify(sources));
  }, [sources]);

  useEffect(() => {
    safeStorage.set(STORAGE_KEYS.points, JSON.stringify(points));
  }, [points]);

  const [editingPoints, setEditingPoints] = useState(false);
  // Click-based selection for person breakdown card:
  //   { personKey, rect, sliceKey, actionIndex } | null
  const [selectedPerson, setSelectedPerson] = useState(null);

  // Navigation between pages
  const [activePage, setActivePage] = useState(() => {
    const stored = safeStorage.get(STORAGE_KEYS.activePage);
    return ['overview', 'team', 'trends', 'duplicates', 'sf_bonus', 'import'].includes(stored) ? stored : 'overview';
  });
  useEffect(() => {
    safeStorage.set(STORAGE_KEYS.activePage, activePage);
  }, [activePage]);
  const onNavigate = (page) => {
    setActivePage(page);
    setSelectedPerson(null);
  };

  // Which upload card is currently showing its delete-confirmation state.
  // Holds a sourceKey ('salesforce' | 'zoom' | 'zoomPhone' | 'calendly') or null.
  const [confirmingDeleteKey, setConfirmingDeleteKey] = useState(null);

  const onPersonClick = (e, person) => {
    // Find the name anchor within the row for positioning (falls back to row rect)
    const nameEl = e.currentTarget.querySelector('.person-name-anchor');
    const rect = nameEl ? nameEl.getBoundingClientRect() : e.currentTarget.getBoundingClientRect();
    setSelectedPerson(prev => {
      // Click same row → toggle off
      if (prev?.personKey === person.key) return null;
      return { personKey: person.key, rect, sliceKey: null, actionIndex: null };
    });
  };
  const onSliceSelect = (sliceKey) => {
    setSelectedPerson(prev => {
      if (!prev) return prev;
      // Click same slice → toggle back to pie
      return {
        ...prev,
        sliceKey: prev.sliceKey === sliceKey ? null : sliceKey,
        actionIndex: null // reset action drill-down when category changes
      };
    });
  };
  const onActionSelect = (index) => {
    setSelectedPerson(prev => prev ? { ...prev, actionIndex: index } : prev);
  };
  const onActionBack = () => {
    setSelectedPerson(prev => prev ? { ...prev, actionIndex: null } : prev);
  };
  const onClosePersonCard = () => setSelectedPerson(null);

  // Close the breakdown card on Escape
  useEffect(() => {
    if (!selectedPerson) return;
    const onKey = (e) => { if (e.key === 'Escape') setSelectedPerson(null); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [selectedPerson]);

  /* --------- File upload handling --------- */

  const handleFile = useCallback((sourceKey, file) => {
    if (!file) return;
    const cfg = SOURCE_CONFIG[sourceKey];
    const allHints = [
      ...cfg.nameHints,
      ...cfg.previewHints,
      ...(cfg.countColumnHints || []),
      ...(cfg.dateColumnHints || [])
    ];
    parseFile(file, allHints)
      .then(({ columns, rows }) => {
        if (columns.length === 0) {
          throw new Error("Couldn't find a header row with recognizable columns.");
        }
        const selected = autoDetectNameColumn(columns, cfg.nameHints);
        const detectedCount = autoDetectCountColumn(
          columns, cfg.countColumnHints || [], rows, selected
        );
        const detectedDate = autoDetectDateColumn(columns, cfg.dateColumnHints || []);
        setSources(prev => ({
          ...prev,
          [sourceKey]: {
            fileName: file.name,
            columns,
            rows,
            selectedColumn: selected,
            countColumn: detectedCount,
            dateColumn: detectedDate,
            error: null
          }
        }));
      })
      .catch(err => {
        setSources(prev => ({
          ...prev,
          [sourceKey]: {
            fileName: file.name,
            columns: [],
            rows: [],
            selectedColumn: null,
            countColumn: null,
            dateColumn: null,
            error: err.message || 'Failed to parse file'
          }
        }));
      });
  }, []);

  const clearSource = (sourceKey) => {
    setSources(prev => ({
      ...prev,
      [sourceKey]: { fileName: null, columns: [], rows: [], selectedColumn: null, countColumn: null, dateColumn: null, error: null }
    }));
  };

  const loadSampleData = () => {
    // Pools of realistic-looking preview values
    const zoomTopics = [
      'ClassLink Annual Review',
      'Engagement Strategic Planning Meeting',
      'Product Support Call - 30 Minutes',
      'ClassLink Overview / Demo',
      'AD Connector Update Support',
      'Roster Server Config Session',
      'Implementation Kickoff',
      'QBR - Q2 Check-in',
      'Technical Deep Dive',
      'Onboarding Walk-through'
    ];
    const sfSubjects = [
      'SSO login not working for students',
      'Roster sync failing nightly',
      'Password reset flow broken',
      'MFA enrollment issue',
      'Dashboard loading slowly',
      'LTI integration help needed',
      'Add new admin user request',
      'App tile icons missing'
    ];
    const sfStatuses = ['New', 'In Progress', 'Escalated', 'Waiting', 'Resolved'];
    const directions = ['Inbound', 'Outbound'];
    const calendlyTypes = [
      '30 Minute Meeting', '15 Minute Call', 'Discovery Call',
      'Product Demo', 'Strategic Review', 'Support Session'
    ];
    const invitees = [
      'alex.admin@district.edu', 'taylor.it@schools.org',
      'jordan.coord@academy.net', 'casey.dir@k12.us',
      'morgan.super@edu.gov', 'riley.tech@district.edu'
    ];

    const pick = (arr, i) => arr[i % arr.length];
    const fmtDate = (daysAgo, hour, min) => {
      const d = new Date();
      d.setDate(d.getDate() - daysAgo);
      d.setHours(hour, min, 0, 0);
      return d.toLocaleString('en-US', {
        month: 'numeric', day: 'numeric', year: 'numeric',
        hour: 'numeric', minute: '2-digit'
      });
    };
    // Sample data spans ~4 weeks so the Trends chart has multiple points per person
    const daysAgoFor = (i) => (i * 3) % 28;

    // Build richer rows for each source (not just the name column)
    const buildSalesforceRows = () =>
      SAMPLE_TEAM.flatMap(([name, count]) =>
        Array.from({ length: count }, (_, i) => ({
          'Case Number': `000${75000 + Math.floor(Math.random() * 9999)}`,
          'Subject': pick(sfSubjects, i + name.length),
          'Case Owner': name,
          'Date/Time Opened': fmtDate(daysAgoFor(i + name.length), 9 + (i % 8), (i * 7) % 60),
          'Status': pick(sfStatuses, i + name.length)
        }))
      );

    const buildZoomRows = () =>
      SAMPLE_TEAM.flatMap(([name, , count]) =>
        Array.from({ length: count }, (_, i) => {
          const start = fmtDate(daysAgoFor(i + name.length), 9 + (i % 8), (i * 7) % 60);
          const endH = String(10 + ((i + 1) % 8));
          const endM = String(((i * 7 + 30) % 60)).padStart(2, '0');
          return {
            'Meeting ID': `${800 + i} ${1000 + i * 3} ${2000 + i}`,
            'Topic': pick(zoomTopics, i + name.length),
            'Host': name,
            'Start Time': start,
            'End Time': `${endH}:${endM} ${i % 2 ? 'PM' : 'AM'}`
          };
        })
      );

    const buildCalendlyRows = () =>
      SAMPLE_TEAM.flatMap(([name, , , count]) =>
        Array.from({ length: count }, (_, i) => ({
          'Event Type': pick(calendlyTypes, i + name.length),
          'Host Name': name,
          'Invitee': pick(invitees, i + name.length),
          'Event Date': fmtDate(daysAgoFor(i + name.length), 10 + (i % 6), 0)
        }))
      );

    const buildPhoneRows = () =>
      SAMPLE_TEAM.flatMap(([name, , , , count]) =>
        Array.from({ length: count }, (_, i) => ({
          'Call ID': `CALL-${10000 + i}-${name.length}`,
          'User Name': name,
          'Direction': pick(directions, i),
          'Duration': `${Math.floor(Math.random() * 12) + 1}m ${Math.floor(Math.random() * 60)}s`,
          'Date': fmtDate(daysAgoFor(i + name.length), 8 + (i % 10), (i * 3) % 60)
        }))
      );

    setSources({
      salesforce: {
        fileName: 'sample_salesforce_cases.csv',
        columns: ['Case Number', 'Subject', 'Case Owner', 'Date/Time Opened', 'Status'],
        rows: buildSalesforceRows(),
        selectedColumn: 'Case Owner',
        countColumn: null,
        dateColumn: 'Date/Time Opened',
        error: null
      },
      zoom: {
        fileName: 'sample_zoom_meetings.xlsx',
        columns: ['Meeting ID', 'Topic', 'Host', 'Start Time', 'End Time'],
        rows: buildZoomRows(),
        selectedColumn: 'Host',
        countColumn: null,
        dateColumn: 'Start Time',
        error: null
      },
      zoomPhone: {
        fileName: 'sample_zoom_phone_calls.csv',
        columns: ['Call ID', 'User Name', 'Direction', 'Duration', 'Date'],
        rows: buildPhoneRows(),
        selectedColumn: 'User Name',
        countColumn: null,
        dateColumn: 'Date',
        error: null
      },
      calendly: {
        fileName: 'sample_calendly_events.csv',
        columns: ['Event Type', 'Host Name', 'Invitee', 'Event Date'],
        rows: buildCalendlyRows(),
        selectedColumn: 'Host Name',
        countColumn: null,
        dateColumn: 'Event Date',
        error: null
      }
    });
  };

  const resetAll = () => {
    setSources(DEFAULT_SOURCES);
    setPoints(DEFAULT_POINTS);
    safeStorage.remove(STORAGE_KEYS.sources);
    safeStorage.remove(STORAGE_KEYS.points);
  };

  /* --------- Derived data --------- */

  // Detect Zoom meetings that duplicate Calendly bookings (same case number or
  // same district, same host, start times within 30 minutes). Returns both
  // the skip-set and a details array explaining each match (for the Duplicates page).
  const zoomDuplicateResult = useMemo(() => {
    return findZoomDuplicates(
      sources.calendly.rows,
      sources.zoom.rows,
      sources.calendly.dateColumn,
      sources.zoom.dateColumn,
      sources.calendly.selectedColumn,
      sources.zoom.selectedColumn
    );
  }, [sources.calendly, sources.zoom]);
  const zoomDuplicateIndices = zoomDuplicateResult.indices;
  const zoomDuplicateDetails = zoomDuplicateResult.details;

  // Zoom rows whose meeting was shorter than MIN_ZOOM_DURATION_MINUTES — these
  // are treated as false starts / failed connects and excluded from counting.
  const zoomShortMeetingIndices = useMemo(() => {
    const s = new Set();
    const rows = sources.zoom.rows;
    for (let i = 0; i < rows.length; i++) {
      if (isZoomMeetingTooShort(rows[i])) s.add(i);
    }
    return s;
  }, [sources.zoom.rows]);

  // Combined skip set for Zoom counting — dupes ∪ short meetings.
  const zoomSkipIndices = useMemo(() => {
    const s = new Set(zoomDuplicateIndices);
    for (const i of zoomShortMeetingIndices) s.add(i);
    return s;
  }, [zoomDuplicateIndices, zoomShortMeetingIndices]);

  // Detect Salesforce rows whose case number is already represented by a
  // Calendly booking or a non-duplicate Zoom meeting — those rows would
  // otherwise earn a second point for the same case. Priority: Calendly > Zoom.
  // Uses zoomSkipIndices so a case only counted-out via Calendly won't cause
  // double-skipping of its Salesforce row.
  const salesforceDuplicateResult = useMemo(() => {
    return findSalesforceDuplicates(
      sources.salesforce.rows,
      sources.salesforce.columns,
      sources.calendly.rows,
      sources.zoom.rows,
      zoomSkipIndices
    );
  }, [sources.salesforce, sources.calendly, sources.zoom, zoomSkipIndices]);
  const salesforceDuplicateIndices = salesforceDuplicateResult.indices;
  const salesforceDuplicateDetails = salesforceDuplicateResult.details;

  // Salesforce uses its own counter because rows with Category Details
  // "Login Issue" or "AD (TMS)" earn bonus points instead of the base 1 pt.
  const salesforceResult = useMemo(() => {
    return countSalesforceRows(
      sources.salesforce.rows,
      sources.salesforce.selectedColumn,
      salesforceDuplicateIndices,
      points.salesforceTicket
    );
  }, [sources.salesforce.rows, sources.salesforce.selectedColumn, salesforceDuplicateIndices, points.salesforceTicket]);
  const salesforceBonusRows = salesforceResult.bonusRows;

  const counts = useMemo(() => ({
    salesforce: salesforceResult.counts,
    zoom:       countByColumn(sources.zoom.rows, sources.zoom.selectedColumn, sources.zoom.countColumn, zoomSkipIndices),
    zoomPhone:  countByColumn(sources.zoomPhone.rows, sources.zoomPhone.selectedColumn, sources.zoomPhone.countColumn),
    calendly:   countByColumn(sources.calendly.rows, sources.calendly.selectedColumn, sources.calendly.countColumn)
  }), [sources, zoomSkipIndices, salesforceResult]);

  const people = useMemo(() => {
    // Collect all unique keys across sources
    const allKeys = new Set([
      ...Object.keys(counts.salesforce),
      ...Object.keys(counts.zoom),
      ...Object.keys(counts.zoomPhone),
      ...Object.keys(counts.calendly)
    ]);
    return Array.from(allKeys)
      .map(key => {
        const sfEntry = counts.salesforce[key];
        const zEntry  = counts.zoom[key];
        const zpEntry = counts.zoomPhone[key];
        const cEntry  = counts.calendly[key];

        const sf = sfEntry?.count || 0;
        const z  = zEntry?.count  || 0;
        const zp = zpEntry?.count || 0;
        const c  = cEntry?.count  || 0;
        // Salesforce points already factor in bonus tickets (Login Issue, AD Connector).
        const sfPts = sfEntry?.points || 0;
        const sfBonus = sfEntry?.bonusCount || 0;

        // Aggregate all original name spellings seen for this person
        const allNames = Array.from(new Set([
          ...(sfEntry?.names || []),
          ...(zEntry?.names  || []),
          ...(zpEntry?.names || []),
          ...(cEntry?.names  || [])
        ]));
        // Display name: prefer the canonical roster spelling; fall back to the
        // longest variant seen in uploads, then to the nameKey itself.
        const displayName =
          ROSTER_DISPLAY[key] ||
          allNames.sort((a, b) => b.length - a.length)[0] ||
          key;
        const aliases = allNames.filter(n => n !== displayName);

        const pts =
          sfPts +
          z  * points.zoomMeeting +
          zp * points.zoomPhoneCall +
          c  * points.calendlyMeeting;
        return {
          key,
          name: displayName,
          aliases,
          salesforce: sf,
          salesforceBonusCount: sfBonus,
          salesforcePoints: sfPts,
          zoom: z,
          zoomPhone: zp,
          calendly: c,
          totalActions: sf + z + zp + c,
          points: pts
        };
      })
      .sort((a, b) => b.points - a.points);
  }, [counts, points]);

  const totals = useMemo(() => {
    const totalPoints = people.reduce((s, p) => s + p.points, 0);
    const totalActions = people.reduce((s, p) => s + p.totalActions, 0);
    const sumCounts = (srcCounts) => Object.values(srcCounts).reduce((s, v) => s + v.count, 0);
    const sumPoints = (srcCounts) => Object.values(srcCounts).reduce((s, v) => s + (v.points || 0), 0);
    const sfPoints = sumPoints(counts.salesforce); // already factors in bonuses
    const zPoints  = sumCounts(counts.zoom)       * points.zoomMeeting;
    const zpPoints = sumCounts(counts.zoomPhone)  * points.zoomPhoneCall;
    const cPoints  = sumCounts(counts.calendly)   * points.calendlyMeeting;
    return { totalPoints, totalActions, sfPoints, zPoints, zpPoints, cPoints };
  }, [people, counts, points]);

  const hasData = people.length > 0;
  const topPerformer = people[0];

  // Weekly cumulative points per person — for the Trends page
  // Returns: { weeks: [{key, label}, ...], series: [{ key, name, color, points: { [weekKey]: cumulative } }, ...] }
  const weeklyTrends = useMemo(() => {
    if (!hasData) return { weeks: [], series: [], missingSources: [] };

    // Gather { personKey, weekKey, pointsDelta } events from every source
    const events = [];
    const missingSources = [];
    const sourceByPointsKey = {
      salesforceTicket: 'salesforce',
      zoomMeeting:      'zoom',
      zoomPhoneCall:    'zoomPhone',
      calendlyMeeting:  'calendly'
    };

    for (const [pointsKey, sourceKey] of Object.entries(sourceByPointsKey)) {
      const src = sources[sourceKey];
      if (!src || !src.selectedColumn || src.rows.length === 0) continue;
      const perAction = points[pointsKey];
      if (!perAction) continue;

      // If no date column, we can't place this source on the timeline accurately.
      // Track it so we can warn the user.
      if (!src.dateColumn) {
        missingSources.push(SOURCE_CONFIG[sourceKey].label);
        continue;
      }

      for (let rowIdx = 0; rowIdx < src.rows.length; rowIdx++) {
        // Skip Zoom rows that duplicate a Calendly booking
        if (sourceKey === 'zoom' && zoomSkipIndices.has(rowIdx)) continue;
        if (sourceKey === 'salesforce' && salesforceDuplicateIndices.has(rowIdx)) continue;
        const row = src.rows[rowIdx];
        const name = String(row[src.selectedColumn] || '').trim();
        if (!name) continue;
        const rawKey = nameKey(name);
        if (!rawKey) continue;
        if (!ROSTER_KEYS.has(rawKey)) continue; // roster whitelist
        const key = CANONICAL_KEY[rawKey] || rawKey; // merge aliases

        const date = parseDateFlexible(row[src.dateColumn]);
        if (!date) continue;

        // Figure out how many actions this row represents
        let actions = 1;
        if (src.countColumn) {
          const v = row[src.countColumn];
          const n = typeof v === 'number' ? v : parseFloat(String(v || '').replace(/,/g, ''));
          actions = isNaN(n) ? 0 : Math.max(0, Math.round(n));
        }
        if (actions <= 0) continue;

        // Salesforce rows may earn a bonus when classified as AD Connector work.
        let rowPoints;
        if (sourceKey === 'salesforce') {
          const bonus = classifySalesforceBonus(row);
          rowPoints = bonus ? SALESFORCE_BONUS_POINTS : actions * perAction;
        } else {
          rowPoints = actions * perAction;
        }

        events.push({
          personKey: key,
          weekKey: weekKey(date),
          points: rowPoints
        });
      }
    }

    if (events.length === 0) return { weeks: [], series: [], missingSources };

    // Collect unique week keys and sort chronologically
    const weekSet = new Set(events.map(e => e.weekKey));
    const weekKeys = Array.from(weekSet).sort();
    const weeks = weekKeys.map(k => ({ key: k, label: weekLabel(k) }));

    // Build per-person weekly cumulative totals
    // { personKey: { weekKey: weekPointsDelta } }
    const perPersonWeek = {};
    for (const ev of events) {
      if (!perPersonWeek[ev.personKey]) perPersonWeek[ev.personKey] = {};
      perPersonWeek[ev.personKey][ev.weekKey] =
        (perPersonWeek[ev.personKey][ev.weekKey] || 0) + ev.points;
    }

    // Only include people who actually have dated points in this window
    const series = people
      .filter(p => perPersonWeek[p.key])
      .map(p => {
        const hue = nameToHue(p.name);
        const weekPoints = perPersonWeek[p.key];
        // Cumulative across the full week list (fills forward when no new actions)
        let running = 0;
        const points = {};
        for (const wk of weekKeys) {
          running += weekPoints[wk] || 0;
          points[wk] = running;
        }
        return {
          key: p.key,
          name: p.name,
